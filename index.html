<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Challenge</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;width:100%;height:100%;overflow:hidden;
  font-family:Arial,sans-serif;background:#111;
}
canvas{display:block;width:100vw;height:100vh;touch-action:none}

.screen{
  position:fixed;inset:0;z-index:10;
  display:flex;justify-content:center;align-items:center;
  flex-direction:column;text-align:center;padding:25px;color:white;
}

#inicio{background:linear-gradient(135deg,#4f46e5,#06b6d4,#22c55e)}
#inicio h1{font-size:clamp(38px,8vw,76px);margin:0 0 18px}
#inicio p{font-size:21px;max-width:650px;line-height:1.4}

button{
  border:none;cursor:pointer;font-weight:bold;
  padding:17px 34px;border-radius:999px;font-size:22px;
  background:#ffdd00;color:#111;box-shadow:0 10px 25px rgba(0,0,0,.3);
}

#gameOver{display:none;background:rgba(0,0,0,.88)}
#final{display:none;background:linear-gradient(135deg,#111827,#1e293b)}

.carta-wrap{
  margin-top:25px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:22px;
}

.sobre{
  width:300px;
  height:200px;
  position:relative;
  background:#fff3c4;
  border:4px solid #b88922;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 18px 45px rgba(0,0,0,.45);
}

.sobre::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(35deg, transparent 49%, #b88922 50%, transparent 51%),
    linear-gradient(-35deg, transparent 49%, #b88922 50%, transparent 51%);
  z-index:3;
}

.sobre .solapa{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:110px;
  background:#ffe08a;
  clip-path:polygon(0 0,100% 0,50% 100%);
  border-bottom:3px solid #b88922;
  z-index:4;
}

.sobre .lado-izq{
  position:absolute;
  left:0;
  bottom:0;
  width:55%;
  height:100%;
  background:#ffe9a8;
  clip-path:polygon(0 0,100% 50%,0 100%);
  z-index:2;
}

.sobre .lado-der{
  position:absolute;
  right:0;
  bottom:0;
  width:55%;
  height:100%;
  background:#ffd970;
  clip-path:polygon(100% 0,0 50%,100% 100%);
  z-index:2;
}

.sobre .frente{
  position:absolute;
  left:0;
  bottom:0;
  width:100%;
  height:100%;
  background:#fff8df;
  clip-path:polygon(0 100%,50% 45%,100% 100%);
  z-index:5;
}

#btnAbrir{
  position:static;
  transform:none;
  margin:0;
  background:#ffdd00;
  color:#111;
}

#imagenFinal{
  display:none;
  max-width:88vw;
  max-height:70vh;
  border-radius:22px;
  margin-top:20px;
  box-shadow:0 0 35px rgba(255,255,255,.35);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="inicio" class="screen">
  <h1>RUNNER CHALLENGE</h1>
  <p>
    Toca la pantalla o presiona espacio para saltar.
    Evita los obstáculos, recoge monedas y completa el recorrido para pasar de nivel.
  </p>
  <button id="btnInicio">Comenzar ahora</button>
</div>

<div id="gameOver" class="screen">
  <h1>GAME OVER</h1>
  <p>No tienes monedas para revivir.</p>
  <button id="btnReintentar">Intentar de nuevo</button>
</div>

<div id="final" class="screen">
  <h1>¡Felicidades!</h1>
  <p>Tienes esta carta. Ábrela.</p>

  <div class="carta-wrap" id="cartaWrap">
    <div class="sobre">
      <div class="solapa"></div>
      <div class="lado-izq"></div>
      <div class="lado-der"></div>
      <div class="frente"></div>
    </div>
    <button id="btnAbrir">Abrir</button>
  </div>

  <img id="imagenFinal" src="carta.jpg" alt="Carta">
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H,suelo;
let frame,velocidad,gravedad,completados,jugando,perdio,gano;
let obstaculos=[];
let monedas=[];
let monedasJugador=0;
let invencible=0;

const META=20;

const jugador={
  x:120,y:0,
  ancho:36,alto:68,
  vy:0,saltando:false
};

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  suelo=H*0.74;
}
resize();
addEventListener("resize",resize);

function resetear(){
  frame=0;
  velocidad=10.8;
  gravedad=1.1;
  completados=0;
  monedasJugador=0;
  invencible=0;
  jugando=false;
  perdio=false;
  gano=false;
  obstaculos=[];
  monedas=[];
  jugador.y=suelo-jugador.alto;
  jugador.vy=0;
  jugador.saltando=false;
}

resetear();

function iniciar(){
  resetear();
  document.getElementById("inicio").style.display="none";
  document.getElementById("gameOver").style.display="none";
  document.getElementById("final").style.display="none";
  document.getElementById("cartaWrap").style.display="flex";
  document.getElementById("imagenFinal").style.display="none";
  jugando=true;
  loop();
}

document.getElementById("btnInicio").onclick=iniciar;
document.getElementById("btnReintentar").onclick=iniciar;

function saltar(e){
  if(e)e.preventDefault();
  if(!jugando||perdio||gano)return;
  if(!jugador.saltando){
    jugador.vy=-19.2;
    jugador.saltando=true;
  }
}

addEventListener("pointerdown",saltar,{passive:false});
addEventListener("keydown",e=>{
  if(e.code==="Space"||e.code==="ArrowUp")saltar(e);
});

function crearObstaculo(){
  const alto=45+Math.random()*24;
  obstaculos.push({
    x:W+80,
    y:suelo-alto,
    ancho:36+Math.random()*12,
    alto:alto,
    pasado:false,
    color:["#ef4444","#f97316","#8b5cf6","#06b6d4"][Math.floor(Math.random()*4)]
  });
}

function crearMoneda(){
  monedas.push({
    x:W+80,
    y:suelo-105-Math.random()*70,
    r:12,
    tomada:false
  });
}

function fondo(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#60a5fa");
  g.addColorStop(.55,"#93c5fd");
  g.addColorStop(1,"#22c55e");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="rgba(255,255,255,.85)";
  for(let i=0;i<5;i++){
    const x=(i*260-frame*0.8)%(W+300)-150;
    const y=70+(i%3)*50;
    nube(x,y);
  }

  ctx.fillStyle="#16a34a";
  ctx.fillRect(0,suelo,W,H-suelo);
  ctx.fillStyle="#15803d";
  ctx.fillRect(0,suelo,W,8);
}

function nube(x,y){
  ctx.beginPath();
  ctx.arc(x,y,20,0,Math.PI*2);
  ctx.arc(x+25,y-10,28,0,Math.PI*2);
  ctx.arc(x+55,y,20,0,Math.PI*2);
  ctx.fill();
}

function muneco(){
  const x=jugador.x,y=jugador.y;

  ctx.save();
  if(invencible>0) ctx.globalAlpha = frame%10<5 ? .45 : 1;

  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.arc(x+18,y+14,13,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.arc(x+18,y+7,14,Math.PI,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#2563eb";
  ctx.fillRect(x+7,y+28,23,27);

  ctx.strokeStyle="#facc15";
  ctx.lineWidth=5;
  ctx.lineCap="round";
  ctx.beginPath();

  if(frame%14<7){
    ctx.moveTo(x+8,y+34);ctx.lineTo(x-6,y+46);
    ctx.moveTo(x+29,y+34);ctx.lineTo(x+42,y+44);
  }else{
    ctx.moveTo(x+8,y+34);ctx.lineTo(x-5,y+40);
    ctx.moveTo(x+29,y+34);ctx.lineTo(x+42,y+50);
  }
  ctx.stroke();

  ctx.strokeStyle="#111";
  ctx.lineWidth=6;
  ctx.beginPath();

  if(jugador.saltando){
    ctx.moveTo(x+13,y+55);ctx.lineTo(x+4,y+68);
    ctx.moveTo(x+25,y+55);ctx.lineTo(x+35,y+68);
  }else if(frame%14<7){
    ctx.moveTo(x+13,y+55);ctx.lineTo(x+3,y+70);
    ctx.moveTo(x+25,y+55);ctx.lineTo(x+38,y+66);
  }else{
    ctx.moveTo(x+13,y+55);ctx.lineTo(x,y+65);
    ctx.moveTo(x+25,y+55);ctx.lineTo(x+34,y+70);
  }
  ctx.stroke();

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.arc(x+25,y+14,2.5,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function dibujarObstaculo(o){
  ctx.fillStyle=o.color;
  ctx.fillRect(o.x,o.y,o.ancho,o.alto);
  ctx.fillStyle="rgba(255,255,255,.35)";
  ctx.fillRect(o.x+5,o.y+5,o.ancho-10,7);
}

function dibujarMoneda(m){
  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="bold 14px Arial";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("$",m.x,m.y+1);
}

function colisionRect(a,b){
  const m=5;
  return(
    a.x+m<b.x+b.ancho &&
    a.x+a.ancho-m>b.x &&
    a.y+m<b.y+b.alto &&
    a.y+a.alto-m>b.y
  );
}

function colisionMoneda(a,m){
  return(
    a.x < m.x + m.r &&
    a.x + a.ancho > m.x - m.r &&
    a.y < m.y + m.r &&
    a.y + a.alto > m.y - m.r
  );
}

function revivir(){
  monedasJugador--;
  invencible=120;
  obstaculos = obstaculos.filter(o => o.x < jugador.x - 80 || o.x > jugador.x + 180);
  jugador.y=suelo-jugador.alto;
  jugador.vy=0;
  jugador.saltando=false;
}

function perder(){
  if(monedasJugador>0){
    revivir();
    return;
  }

  perdio=true;
  jugando=false;
  document.getElementById("gameOver").style.display="flex";
}

function ganar(){
  gano=true;
  jugando=false;
  document.getElementById("final").style.display="flex";
}

function loop(){
  if(!jugando||perdio||gano)return;

  frame++;
  if(invencible>0) invencible--;

  fondo();

  jugador.vy+=gravedad;
  jugador.y+=jugador.vy;

  if(jugador.y>=suelo-jugador.alto){
    jugador.y=suelo-jugador.alto;
    jugador.vy=0;
    jugador.saltando=false;
  }

  if(frame%60===0)crearObstaculo();
  if(frame%95===0)crearMoneda();

  for(let i=0;i<monedas.length;i++){
    const m=monedas[i];
    m.x-=velocidad;
    dibujarMoneda(m);

    if(!m.tomada && colisionMoneda(jugador,m)){
      m.tomada=true;
      monedasJugador++;
    }
  }

  monedas=monedas.filter(m=>m.x>-50 && !m.tomada);

  for(let i=0;i<obstaculos.length;i++){
    const o=obstaculos[i];
    o.x-=velocidad;
    dibujarObstaculo(o);

    if(invencible<=0 && colisionRect(jugador,o)){
      perder();
      return;
    }

    if(!o.pasado&&o.x+o.ancho<jugador.x){
      o.pasado=true;
      completados++;
      velocidad+=0.18;
    }
  }

  obstaculos=obstaculos.filter(o=>o.x>-100);

  muneco();

  ctx.fillStyle="#111";
  ctx.font="bold 22px Arial";
  ctx.textAlign="left";
  ctx.fillText("Nivel: "+completados+" / "+META,25,42);
  ctx.fillText("Monedas: "+monedasJugador,25,72);

  if(completados>=META){
    ganar();
    return;
  }

  requestAnimationFrame(loop);
}

document.getElementById("btnAbrir").onclick=()=>{
  document.getElementById("cartaWrap").style.display="none";
  document.getElementById("imagenFinal").style.display="block";
};
</script>

</body>
</html>
