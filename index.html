<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Runner Challenge</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#111;
}

canvas{
  display:block;
  width:100vw;
  height:100vh;
  touch-action:none;
}

.screen{
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:25px;
  color:white;
}

#inicio{
  background:linear-gradient(135deg,#4f46e5,#06b6d4,#22c55e);
}

#inicio h1{
  font-size:clamp(40px,8vw,80px);
  margin:0 0 20px;
}

#inicio p{
  font-size:21px;
  max-width:650px;
  line-height:1.4;
}

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#btnInicio,#btnReintentar,#btnAbrir{
  margin-top:25px;
  padding:18px 34px;
  border-radius:999px;
  font-size:22px;
  background:#ffdd00;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

#gameOver{
  display:none;
  background:rgba(0,0,0,.85);
}

#final{
  display:none;
  background:linear-gradient(135deg,#111827,#1e293b);
}

.sobre{
  width:260px;
  height:170px;
  background:#facc15;
  margin-top:25px;
  position:relative;
  border-radius:10px;
  box-shadow:0 15px 35px rgba(0,0,0,.45);
}

.sobre:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent 49%,#eab308 50%);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
  border-radius:10px;
}

#imagenFinal{
  display:none;
  max-width:88vw;
  max-height:65vh;
  border-radius:22px;
  margin-top:20px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="inicio" class="screen">
  <h1>RUNNER CHALLENGE</h1>
  <p>
    Toca la pantalla o presiona espacio para saltar.
    Evita los obstáculos y completa 20 para ganar.
  </p>
  <button id="btnInicio">Comenzar ahora</button>
</div>

<div id="gameOver" class="screen">
  <h1>GAME OVER</h1>
  <p>Chocaste con un obstáculo.</p>
  <button id="btnReintentar">Intentar de nuevo</button>
</div>

<div id="final" class="screen">
  <h1>¡Felicidades!</h1>
  <p>Tienes esta carta. Ábrela.</p>

  <div class="sobre" id="sobre">
    <button id="btnAbrir">Abrir</button>
  </div>

  <img id="imagenFinal" src="sorpresa.jpg" alt="Carta">
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H,suelo;
let frame,velocidad,gravedad,completados,jugando,perdio,gano;
let obstaculos = [];

const jugador = {
  x:100,
  y:0,
  ancho:46,
  alto:86,
  vy:0,
  saltando:false
};

function resize(){
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  suelo = H * 0.78;
}
resize();
addEventListener("resize",resize);

function resetear(){
  frame = 0;
  velocidad = 9;
  gravedad = 1.05;
  completados = 0;
  jugando = false;
  perdio = false;
  gano = false;
  obstaculos = [];

  jugador.y = suelo - jugador.alto;
  jugador.vy = 0;
  jugador.saltando = false;
}

resetear();

function iniciar(){
  resetear();
  document.getElementById("inicio").style.display="none";
  document.getElementById("gameOver").style.display="none";
  document.getElementById("final").style.display="none";
  jugando = true;
  loop();
}

document.getElementById("btnInicio").onclick = iniciar;
document.getElementById("btnReintentar").onclick = iniciar;

function saltar(e){
  if(e) e.preventDefault();
  if(!jugando || perdio || gano) return;

  if(!jugador.saltando){
    jugador.vy = -21;
    jugador.saltando = true;
  }
}

addEventListener("pointerdown",saltar,{passive:false});

addEventListener("keydown",e=>{
  if(e.code==="Space" || e.code==="ArrowUp"){
    saltar(e);
  }
});

function crearObstaculo(){
  const alto = 55 + Math.random()*25;

  obstaculos.push({
    x: W + 70,
    y: suelo - alto,
    ancho: 44,
    alto: alto,
    pasado:false,
    color:["#ef4444","#f97316","#8b5cf6","#06b6d4"][Math.floor(Math.random()*4)]
  });
}

function fondo(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#60a5fa");
  g.addColorStop(.55,"#93c5fd");
  g.addColorStop(1,"#22c55e");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="#16a34a";
  ctx.fillRect(0,suelo,W,H-suelo);

  ctx.fillStyle="#15803d";
  ctx.fillRect(0,suelo,W,10);
}

function muneco(){
  const x=jugador.x;
  const y=jugador.y;

  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.arc(x+23,y+18,17,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.arc(x+23,y+9,18,Math.PI,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#2563eb";
  ctx.fillRect(x+8,y+36,30,34);

  ctx.strokeStyle="#facc15";
  ctx.lineWidth=7;
  ctx.lineCap="round";
  ctx.beginPath();

  if(frame%16<8){
    ctx.moveTo(x+10,y+43); ctx.lineTo(x-8,y+58);
    ctx.moveTo(x+36,y+43); ctx.lineTo(x+54,y+55);
  }else{
    ctx.moveTo(x+10,y+43); ctx.lineTo(x-7,y+50);
    ctx.moveTo(x+36,y+43); ctx.lineTo(x+53,y+63);
  }
  ctx.stroke();

  ctx.strokeStyle="#111";
  ctx.lineWidth=8;
  ctx.beginPath();

  if(jugador.saltando){
    ctx.moveTo(x+16,y+69); ctx.lineTo(x+4,y+85);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+45,y+85);
  }else if(frame%16<8){
    ctx.moveTo(x+16,y+69); ctx.lineTo(x+4,y+88);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+47,y+82);
  }else{
    ctx.moveTo(x+16,y+69); ctx.lineTo(x,y+80);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+42,y+88);
  }
  ctx.stroke();

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.arc(x+31,y+18,3,0,Math.PI*2);
  ctx.fill();
}

function dibujarObstaculo(o){
  ctx.fillStyle=o.color;
  ctx.fillRect(o.x,o.y,o.ancho,o.alto);

  ctx.fillStyle="rgba(255,255,255,.35)";
  ctx.fillRect(o.x+6,o.y+6,o.ancho-12,8);
}

function colision(a,b){
  const margen = 8;

  return(
    a.x + margen < b.x + b.ancho &&
    a.x + a.ancho - margen > b.x &&
    a.y + margen < b.y + b.alto &&
    a.y + a.alto - margen > b.y
  );
}

function perder(){
  perdio = true;
  jugando = false;
  document.getElementById("gameOver").style.display="flex";
}

function ganar(){
  gano = true;
  jugando = false;
  document.getElementById("final").style.display="flex";
}

function loop(){
  if(!jugando || perdio || gano) return;

  frame++;
  fondo();

  jugador.vy += gravedad;
  jugador.y += jugador.vy;

  if(jugador.y >= suelo - jugador.alto){
    jugador.y = suelo - jugador.alto;
    jugador.vy = 0;
    jugador.saltando = false;
  }

  if(frame % 78 === 0){
    crearObstaculo();
  }

  for(let i=0;i<obstaculos.length;i++){
    const o = obstaculos[i];

    o.x -= velocidad;
    dibujarObstaculo(o);

    if(colision(jugador,o)){
      perder();
      return;
    }

    if(!o.pasado && o.x + o.ancho < jugador.x){
      o.pasado = true;
      completados++;
      velocidad += 0.18;
    }
  }

  obstaculos = obstaculos.filter(o => o.x > -100);

  muneco();

  ctx.fillStyle="#111";
  ctx.font="bold 25px Arial";
  ctx.fillText("Obstáculos: "+completados+" / 20",25,42);

  if(completados >= 20){
    ganar();
    return;
  }

  requestAnimationFrame(loop);
}

document.getElementById("btnAbrir").onclick = () => {
  document.getElementById("sobre").style.display="none";
  document.getElementById("imagenFinal").style.display="block";
};
</script>

</body>
</html>
