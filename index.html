<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un pequeño juego</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial;
    overflow:hidden;
}

canvas{
    display:block;
}

#start, #surprise, #letter{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
}

#surprise, #letter{
    display:none;
}

button{
    padding:12px 25px;
    background:#c19a6b;
    border:none;
    color:white;
    border-radius:10px;
    margin-top:15px;
}

img{
    max-width:100%;
}
</style>
</head>

<body>

<div id="start">
    <h2>¿Jugamos?</h2>
    <button onclick="startGame()">Empezar</button>
</div>

<canvas id="game"></canvas>

<div id="surprise">
    <h2>Tienes algo para abrir</h2>
    <button onclick="openLetter()">Abrir</button>
</div>

<div id="letter">
    <img src="carta.jpg">
</div>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lanes = [canvas.width/4, canvas.width/2, canvas.width*3/4];
let player = {lane:1, y:canvas.height-120, vy:0, jumping:false};

let obstacles = [];
let speed = 6;
let score = 0;

function startGame(){
    document.getElementById("start").style.display="none";
    gameLoop();
}

function spawnObstacle(){
    let lane = Math.floor(Math.random()*3);
    obstacles.push({lane:lane, y:-50});
}

function update(){
    if(Math.random()<0.03) spawnObstacle();

    obstacles.forEach(o=> o.y += speed);

    if(player.jumping){
        player.vy += 0.8;
        player.y += player.vy;

        if(player.y >= canvas.height-120){
            player.y = canvas.height-120;
            player.jumping=false;
        }
    }

    obstacles.forEach(o=>{
        if(o.y > canvas.height-140 &&
           o.lane === player.lane &&
           !player.jumping){
            gameOver();
        }
    });

    obstacles = obstacles.filter(o=> o.y < canvas.height);

    score++;

    if(score > 500){
        winGame();
    }
}

function draw(){
    ctx.fillStyle="#222";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // lanes
    ctx.strokeStyle="#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width/3,0);
    ctx.lineTo(canvas.width/3,canvas.height);
    ctx.moveTo(canvas.width*2/3,0);
    ctx.lineTo(canvas.width*2/3,canvas.height);
    ctx.stroke();

    // player
    ctx.fillStyle="#c19a6b";
    ctx.fillRect(lanes[player.lane]-20, player.y, 40, 40);

    // obstacles
    ctx.fillStyle="red";
    obstacles.forEach(o=>{
        ctx.fillRect(lanes[o.lane]-20, o.y, 40, 40);
    });
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function jump(){
    if(!player.jumping){
        player.jumping=true;
        player.vy=-15;
    }
}

function moveLeft(){
    if(player.lane > 0) player.lane--;
}

function moveRight(){
    if(player.lane < 2) player.lane++;
}

// TOUCH CONTROLS
let startX;

canvas.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

canvas.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;
    let diff = endX - startX;

    if(Math.abs(diff) > 50){
        if(diff > 0) moveRight();
        else moveLeft();
    } else {
        jump();
    }
});

function gameOver(){
    alert("Intenta otra vez");
    location.reload();
}

function winGame(){
    document.getElementById("surprise").style.display="flex";
}

function openLetter(){
    document.getElementById("surprise").style.display="none";
    document.getElementById("letter").style.display="flex";
}
</script>

</body>
</html>
