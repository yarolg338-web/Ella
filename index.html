<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Un pequeño reto</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Georgia, serif;
      background: #0f0b09;
      color: #f4eadb;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: linear-gradient(to top, #2e221c 0%, #171210 45%, #0e0b0a 100%);
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #startScreen {
      padding: 28px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 220, 170, 0.12), transparent 30%),
        linear-gradient(to bottom, #17120f, #0d0b0a);
    }

    #startScreen h1 {
      margin: 0 0 14px;
      font-size: 2rem;
      color: #f3dfc1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    #startScreen p {
      margin: 0 0 24px;
      max-width: 320px;
      line-height: 1.5;
      color: #d8c3a4;
      font-size: 1rem;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 1rem;
      font-family: inherit;
      background: linear-gradient(135deg, #cfa06d, #8f6743);
      color: #fffaf3;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      position: relative;
      z-index: 30;
    }

    #gameScreen {
      justify-content: flex-start;
      background:
        linear-gradient(to top, rgba(0,0,0,0.20), rgba(0,0,0,0.05)),
        linear-gradient(to top, #3d2d25 0%, #251c18 45%, #151110 100%);
    }

    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 14px 16px 0;
      color: #f0dcc0;
      font-size: 0.97rem;
      z-index: 3;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    #hint {
      margin-top: 8px;
      color: #d9c1a0;
      font-size: 0.95rem;
      text-align: center;
      padding: 0 18px;
      z-index: 3;
      opacity: 0.95;
    }

    #gameCanvas {
      width: 100%;
      height: calc(100% - 70px);
      display: block;
      touch-action: none;
    }

    #overlayMessage {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(8, 7, 7, 0.50);
      z-index: 50;
      text-align: center;
      padding: 24px;
      backdrop-filter: blur(3px);
    }

    #overlayMessage .box {
      background: rgba(28, 21, 18, 0.97);
      border: 1px solid rgba(230, 204, 172, 0.16);
      padding: 22px 18px;
      border-radius: 20px;
      max-width: 320px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.40);
    }

    #overlayMessage h2 {
      margin: 0 0 10px;
      color: #f1dec3;
      font-weight: normal;
    }

    #overlayMessage p {
      margin: 0 0 16px;
      color: #dbc6a8;
      line-height: 1.5;
    }

    #surpriseScreen {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background:
        radial-gradient(circle at 50% 15%, rgba(255, 227, 184, 0.12), transparent 28%),
        linear-gradient(to bottom, #2f241d, #191311);
      padding: 20px;
      text-align: center;
    }

    #surpriseScreen.active {
      display: flex;
      animation: fadeIn 0.9s ease;
    }

    .envelope {
      width: 240px;
      height: 170px;
      position: relative;
      margin-bottom: 22px;
      cursor: pointer;
      transition: transform 0.22s ease;
      filter: drop-shadow(0 10px 25px rgba(0,0,0,0.35));
    }

    .envelope:active {
      transform: scale(0.98);
    }

    .envelope-body {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 125px;
      background: linear-gradient(to bottom, #dfbe94, #cfa476);
      border-radius: 0 0 14px 14px;
      border: 1px solid rgba(90, 55, 30, 0.35);
      overflow: hidden;
    }

    .envelope-body::before,
    .envelope-body::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      background: rgba(145, 94, 61, 0.10);
    }

    .envelope-body::before {
      left: 0;
      clip-path: polygon(0 0, 100% 50%, 0 100%);
    }

    .envelope-body::after {
      right: 0;
      clip-path: polygon(100% 0, 0 50%, 100% 100%);
    }

    .envelope-flap {
      position: absolute;
      top: 18px;
      width: 0;
      height: 0;
      border-left: 120px solid transparent;
      border-right: 120px solid transparent;
      border-bottom: 78px solid #c79e72;
      transform-origin: top center;
      animation: flapIdle 2.5s ease-in-out infinite;
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 84px;
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 30% 30%, #b92a2a, #7d1616);
      border-radius: 50%;
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.12);
      z-index: 3;
    }

    #surpriseScreen h2 {
      margin: 0 0 8px;
      color: #f3dfc1;
      font-weight: normal;
    }

    #surpriseScreen p {
      margin: 0 0 18px;
      color: #d8c3a4;
      max-width: 300px;
      line-height: 1.5;
    }

    #letterScreen {
      display: none;
      background: #110d0b;
      overflow: auto;
      padding: 0;
      justify-content: center;
      align-items: flex-start;
    }

    #letterScreen.active {
      display: flex;
      animation: fadeIn 0.8s ease;
    }

    .letter-wrap {
      width: 100%;
      min-height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px 0 24px;
      background:
        radial-gradient(circle at top, rgba(255, 219, 171, 0.06), transparent 25%),
        linear-gradient(to bottom, #1a1411, #0f0b09);
    }

    .letter-image {
      width: 100%;
      max-width: 760px;
      height: auto;
      display: block;
      margin: 0 auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 230, 190, 0.7);
      animation: sparkle 2.8s linear infinite;
      pointer-events: none;
    }

    @keyframes sparkle {
      0%   { transform: translateY(0) scale(0.7); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translateY(-80px) scale(1.3); opacity: 0; }
    }

    @keyframes flapIdle {
      0%,100% { transform: rotateX(0deg); }
      50%     { transform: rotateX(10deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="startScreen" class="screen active">
      <h1>¿Jugamos?</h1>
      <p>Solo toca la pantalla para saltar y llegar al final.</p>
      <button id="startBtn" class="btn">Empezar</button>
    </section>

    <section id="gameScreen" class="screen">
      <div id="hud">
        <div id="scoreLabel">Puntos: 0</div>
        <div id="goalLabel">Meta: 18</div>
      </div>
      <div id="hint">Toca la pantalla para saltar</div>
      <canvas id="gameCanvas"></canvas>

      <div id="overlayMessage">
        <div class="box">
          <h2>Casi...</h2>
          <p>Una vez más.</p>
          <button id="overlayBtn" class="btn" type="button">Reintentar</button>
        </div>
      </div>
    </section>

    <section id="surpriseScreen" class="screen">
      <div class="envelope" id="openLetter">
        <div class="envelope-flap"></div>
        <div class="envelope-body"></div>
        <div class="seal"></div>
      </div>
      <h2>Tienes algo para abrir</h2>
      <p>Toca el sobre.</p>
      <button class="btn" id="openBtn">Abrir</button>
    </section>

    <section id="letterScreen" class="screen">
      <div class="letter-wrap">
        <img src="carta.jpg" alt="Carta" class="letter-image" />
      </div>
    </section>
  </div>

  <script>
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const surpriseScreen = document.getElementById("surpriseScreen");
    const letterScreen = document.getElementById("letterScreen");

    const startBtn = document.getElementById("startBtn");
    const scoreLabel = document.getElementById("scoreLabel");
    const goalLabel = document.getElementById("goalLabel");
    const overlay = document.getElementById("overlayMessage");
    const overlayBtn = document.getElementById("overlayBtn");
    const openLetter = document.getElementById("openLetter");
    const openBtn = document.getElementById("openBtn");

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let animationId = null;
    let running = false;
    let gameOver = false;
    let won = false;

    const GOAL = 18;
    let score = 0;
    let gameSpeed = 6.0;
    let groundY = 0;

    const runner = {
      x: 70,
      y: 0,
      width: 46,
      height: 64,
      vy: 0,
      gravity: 0.88,
      jumpPower: -14,
      grounded: true,
      bob: 0
    };

    let obstacles = [];
    let obstacleTimer = 0;
    let nextObstacleIn = 85;

    let audioCtx = null;
    let audioReady = false;

    function initAudio() {
      if (audioReady) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      audioReady = true;
    }

    function resumeAudio() {
      if (audioCtx && audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type = "sine", volume = 0.03, when = 0) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime + when);

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + when);
      gain.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + when + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(audioCtx.currentTime + when);
      osc.stop(audioCtx.currentTime + when + duration + 0.02);
    }

    function soundJump() {
      playTone(420, 0.08, "triangle", 0.03);
      playTone(620, 0.06, "triangle", 0.02, 0.05);
    }

    function soundPoint() {
      playTone(700, 0.05, "sine", 0.02);
    }

    function soundLose() {
      playTone(250, 0.10, "sawtooth", 0.035);
      playTone(170, 0.18, "sawtooth", 0.03, 0.08);
    }

    function soundWin() {
      playTone(520, 0.09, "triangle", 0.03);
      playTone(660, 0.09, "triangle", 0.03, 0.09);
      playTone(820, 0.15, "triangle", 0.03, 0.18);
    }

    function soundOpen() {
      playTone(540, 0.05, "sine", 0.025);
      playTone(720, 0.07, "sine", 0.02, 0.05);
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - 70;
      groundY = canvas.height - 95;
      runner.y = groundY - runner.height;
    }

    window.addEventListener("resize", resizeCanvas);

    function showScreen(screen) {
      startScreen.classList.remove("active");
      gameScreen.classList.remove("active");
      surpriseScreen.classList.remove("active");
      letterScreen.classList.remove("active");
      screen.classList.add("active");
    }

    function startGame() {
      initAudio();
      resumeAudio();
      showScreen(gameScreen);
      restartGame();
    }

    function resetGameState() {
      score = 0;
      gameSpeed = 6.0;
      obstacles = [];
      obstacleTimer = 0;
      nextObstacleIn = 75 + Math.random() * 35;
      runner.vy = 0;
      runner.grounded = true;
      runner.bob = 0;
      scoreLabel.textContent = "Puntos: 0";
      goalLabel.textContent = "Meta: " + GOAL;
      gameOver = false;
      won = false;
    }

    function restartGame() {
      cancelAnimationFrame(animationId);
      running = false;
      overlay.style.display = "none";
      resizeCanvas();
      resetGameState();
      running = true;
      animationId = requestAnimationFrame(loop);
    }

    function jump() {
      if (!running || gameOver || won) return;
      if (overlay.style.display === "flex") return;

      if (runner.grounded) {
        runner.vy = runner.jumpPower;
        runner.grounded = false;
        soundJump();
      }
    }

    function spawnObstacle() {
      const kinds = ["thorn", "rock"];
      const kind = kinds[Math.floor(Math.random() * kinds.length)];

      let width, height;
      if (kind === "thorn") {
        width = 22 + Math.random() * 10;
        height = 34 + Math.random() * 28;
      } else {
        width = 28 + Math.random() * 18;
        height = 24 + Math.random() * 14;
      }

      obstacles.push({
        kind,
        x: canvas.width + 25,
        y: groundY - height + 8,
        width,
        height
      });

      obstacleTimer = 0;
      nextObstacleIn = Math.max(48, 82 - score * 1.1) + Math.random() * 28;
    }

    function update() {
      obstacleTimer++;
      runner.bob += 0.12;

      if (obstacleTimer >= nextObstacleIn) spawnObstacle();

      runner.vy += runner.gravity;
      runner.y += runner.vy;

      const floor = groundY - runner.height;
      if (runner.y >= floor) {
        runner.y = floor;
        runner.vy = 0;
        runner.grounded = true;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= gameSpeed;

        if (obs.x + obs.width < 0) {
          obstacles.splice(i, 1);
          score++;
          scoreLabel.textContent = "Puntos: " + score;
          soundPoint();

          if (score % 4 === 0) gameSpeed += 0.35;

          if (score >= GOAL) {
            winGame();
            return;
          }
        } else if (isColliding(runner, obs)) {
          loseGame();
          return;
        }
      }
    }

    function isColliding(a, b) {
      const ax = a.x + 8;
      const ay = a.y + 8;
      const aw = a.width - 16;
      const ah = a.height - 10;

      return (
        ax < b.x + b.width &&
        ax + aw > b.x &&
        ay < b.y + b.height &&
        ay + ah > b.y
      );
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#191310");
      sky.addColorStop(0.55, "#2d211c");
      sky.addColorStop(1, "#4a372c");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255, 221, 174, 0.10)";
      ctx.beginPath();
      ctx.arc(canvas.width - 90, 90, 50, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,0.10)";
      ctx.fillRect(0, groundY - 35, canvas.width, 40);

      ctx.fillStyle = "#5a4436";
      ctx.beginPath();
      ctx.moveTo(0, groundY - 16);
      for (let i = 0; i <= canvas.width; i += 36) {
        ctx.lineTo(i, groundY - 16 + Math.sin(i * 0.02) * 4);
      }
      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#6f5643";
      ctx.fillRect(0, groundY + 6, canvas.width, canvas.height - groundY);

      for (let i = 0; i < canvas.width; i += 24) {
        ctx.fillStyle = i % 48 === 0 ? "#896a54" : "#7a5d49";
        ctx.fillRect(i, groundY + 10, 13, 3);
      }
    }

    function drawRunner() {
      const x = runner.x;
      const y = runner.y + (runner.grounded ? Math.sin(runner.bob) * 1.5 : 0);

      ctx.save();

      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.beginPath();
      ctx.ellipse(x + 24, groundY + 6, 20, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#f2d8b4";
      ctx.beginPath();
      ctx.arc(x + 22, y + 12, 9, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#6b3f2a";
      ctx.beginPath();
      ctx.arc(x + 22, y + 9, 9, Math.PI, 0);
      ctx.fill();

      ctx.fillStyle = "#b4835f";
      ctx.beginPath();
      ctx.roundRect(x + 13, y + 22, 18, 23, 8);
      ctx.fill();

      ctx.strokeStyle = "#e8c39e";
      ctx.lineWidth = 4;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x + 18, y + 45);
      ctx.lineTo(x + 14, y + 60);
      ctx.moveTo(x + 27, y + 45);
      ctx.lineTo(x + 31, y + 60);

      ctx.moveTo(x + 14, y + 29);
      ctx.lineTo(x + 7, y + 40);
      ctx.moveTo(x + 30, y + 29);
      ctx.lineTo(x + 38, y + 38);
      ctx.stroke();

      ctx.fillStyle = "#9d6d4f";
      ctx.beginPath();
      ctx.moveTo(x + 13, y + 24);
      ctx.lineTo(x + 22, y + 18);
      ctx.lineTo(x + 31, y + 24);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawObstacles() {
      obstacles.forEach(obs => {
        if (obs.kind === "thorn") {
          ctx.fillStyle = "#7e4334";
          ctx.beginPath();
          ctx.moveTo(obs.x, obs.y + obs.height);
          ctx.lineTo(obs.x + obs.width * 0.3, obs.y);
          ctx.lineTo(obs.x + obs.width * 0.6, obs.y + obs.height);
          ctx.lineTo(obs.x + obs.width * 0.9, obs.y + 4);
          ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "#a95f49";
          ctx.fillRect(obs.x + 3, obs.y + obs.height - 7, obs.width - 6, 4);
        } else {
          ctx.fillStyle = "#7d5a46";
          ctx.beginPath();
          ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 8);
          ctx.fill();

          ctx.fillStyle = "#9f7860";
          ctx.fillRect(obs.x + 4, obs.y + 5, obs.width - 8, 5);
        }
      });
    }

    function drawParticles() {
      for (let i = 0; i < 3; i++) {
        const px = (performance.now() * 0.03 + i * 130) % canvas.width;
        const py = 80 + i * 45 + Math.sin(performance.now() * 0.001 + i) * 10;
        ctx.fillStyle = "rgba(255, 233, 199, 0.08)";
        ctx.beginPath();
        ctx.arc(px, py, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      drawBackground();
      drawParticles();
      drawRunner();
      drawObstacles();
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      animationId = requestAnimationFrame(loop);
    }

    function loseGame() {
      running = false;
      gameOver = true;
      cancelAnimationFrame(animationId);
      soundLose();
      overlay.style.display = "flex";
    }

    function winGame() {
      running = false;
      won = true;
      cancelAnimationFrame(animationId);
      soundWin();
      setTimeout(() => {
        showScreen(surpriseScreen);
        createSparkles();
      }, 800);
    }

    function revealLetter() {
      soundOpen();
      showScreen(letterScreen);
    }

    function createSparkles() {
      document.querySelectorAll(".sparkle").forEach(el => el.remove());
      for (let i = 0; i < 14; i++) {
        const s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = (window.innerWidth / 2 - 100 + Math.random() * 200) + "px";
        s.style.top = (window.innerHeight / 2 + 20 + Math.random() * 70) + "px";
        s.style.animationDelay = (Math.random() * 1.5) + "s";
        surpriseScreen.appendChild(s);
      }
    }

    startBtn.addEventListener("click", startGame);

    overlayBtn.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      resumeAudio();
      restartGame();
    });

    overlayBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      e.stopPropagation();
      resumeAudio();
      restartGame();
    }, { passive: false });

    canvas.addEventListener("touchstart", function(e) {
      if (!gameScreen.classList.contains("active")) return;
      if (overlay.style.display === "flex") return;
      e.preventDefault();
      resumeAudio();
      jump();
    }, { passive: false });

    canvas.addEventListener("mousedown", function() {
      if (!gameScreen.classList.contains("active")) return;
      if (overlay.style.display === "flex") return;
      resumeAudio();
      jump();
    });

    openLetter.addEventListener("click", revealLetter);
    openBtn.addEventListener("click", revealLetter);

    openLetter.addEventListener("touchstart", function(e) {
      e.preventDefault();
      revealLetter();
    }, { passive: false });

    openBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      revealLetter();
    }, { passive: false });

    resizeCanvas();
  </script>
</body>
</html>
