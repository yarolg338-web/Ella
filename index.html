<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sin conexión</title>

<style>
  body {
    margin: 0;
    background: #f7f7f7;
    font-family: monospace;
    overflow: hidden;
    color: #555;
  }

  canvas {
    display: block;
    margin: 45px auto 0;
    background: #f7f7f7;
    touch-action: manipulation;
  }

  .screen {
    position: absolute;
    width: 100%;
    top: 38%;
    text-align: center;
    color: #555;
    font-size: 18px;
    font-family: monospace;
  }

  .hidden {
    display: none;
  }

  button {
    background: none;
    border: 1px solid #555;
    padding: 8px 18px;
    font-family: monospace;
    cursor: pointer;
    color: #555;
  }

  #finalScreen {
    top: 8%;
  }

  #finalScreen img {
    max-width: 85%;
    max-height: 75vh;
    margin-top: 20px;
  }
</style>
</head>

<body>

<div id="startScreen" class="screen">
  <p>Presiona ESPACIO para comenzar</p>
</div>

<canvas id="gameCanvas" width="800" height="260"></canvas>

<div id="gameOverScreen" class="screen hidden">
  <p>GAME OVER</p>
  <button onclick="restartGame()">Reintentar</button>
</div>

<div id="finalScreen" class="screen hidden">
  <p>Has desbloqueado algo...</p>
  <img src="assets/carta.jpg" alt="Carta">
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScreen = document.getElementById("finalScreen");

let dino;
let obstacles = [];
let clouds = [];
let score = 0;
let speed = 6;
let gravity = 1;
let groundX = 0;
let gameRunning = false;
let started = false;
let animationId = null;

let jumps = 0;
const maxJumps = 20;

let canJump = true;

function resetGame() {
  dino = {
    x: 65,
    y: 178,
    width: 44,
    height: 48,
    velocityY: 0,
    jumping: false
  };

  obstacles = [];
  clouds = [];
  score = 0;
  speed = 6;
  groundX = 0;
  jumps = 0;
  canJump = true;

  gameRunning = true;
  started = true;
}

function startGame() {
  resetGame();

  startScreen.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
  finalScreen.classList.add("hidden");

  canvas.style.display = "block";

  cancelAnimationFrame(animationId);
  loop();
}

function restartGame() {
  startGame();
}

function jump() {
  if (!gameRunning) return;
  if (!canJump) return;
  if (dino.jumping) return;

  dino.velocityY = -17;
  dino.jumping = true;
  canJump = false;

  jumps++;

  if (jumps >= maxJumps) {
    winGame();
  }
}

document.addEventListener("keydown", function(e) {
  if (e.code !== "Space") return;

  e.preventDefault();

  if (!started) {
    startGame();
    return;
  }

  jump();
});

document.addEventListener("keyup", function(e) {
  if (e.code === "Space") {
    canJump = true;
  }
});

canvas.addEventListener("pointerdown", function(e) {
  e.preventDefault();

  if (!started) {
    startGame();
    return;
  }

  jump();
});

canvas.addEventListener("pointerup", function() {
  canJump = true;
});

canvas.addEventListener("pointercancel", function() {
  canJump = true;
});

function createObstacle() {
  const type = Math.random();

  let width;
  let height;

  if (type < 0.45) {
    width = 18;
    height = 40;
  } else if (type < 0.8) {
    width = 28;
    height = 52;
  } else {
    width = 42;
    height = 45;
  }

  obstacles.push({
    x: canvas.width + 30,
    y: 226 - height,
    width,
    height
  });
}

function createCloud() {
  clouds.push({
    x: canvas.width + 30,
    y: 40 + Math.random() * 55
  });
}

function update() {
  score++;

  speed = 6 + score / 400;
  groundX -= speed;

  dino.y += dino.velocityY;
  dino.velocityY += gravity;

  if (dino.y >= 178) {
    dino.y = 178;
    dino.velocityY = 0;
    dino.jumping = false;
  }

  if (score % Math.max(50, Math.floor(100 - speed * 5)) === 0) {
    createObstacle();
  }

  if (score % 180 === 0) {
    createCloud();
  }

  obstacles.forEach(ob => ob.x -= speed);
  clouds.forEach(cloud => cloud.x -= speed * 0.3);

  obstacles = obstacles.filter(ob => ob.x + ob.width > 0);
  clouds = clouds.filter(cloud => cloud.x + 70 > 0);

  for (let ob of obstacles) {
    if (
      dino.x < ob.x + ob.width &&
      dino.x + dino.width > ob.x &&
      dino.y < ob.y + ob.height &&
      dino.y + dino.height > ob.y
    ) {
      loseGame();
    }
  }
}

function loseGame() {
  gameRunning = false;
  gameOverScreen.classList.remove("hidden");
  cancelAnimationFrame(animationId);
}

function winGame() {
  gameRunning = false;
  canvas.style.display = "none";
  gameOverScreen.classList.add("hidden");
  finalScreen.classList.remove("hidden");
  cancelAnimationFrame(animationId);
}

function drawDino() {
  ctx.fillStyle = "#555";

  ctx.fillRect(dino.x + 8, dino.y + 12, 26, 28);
  ctx.fillRect(dino.x + 26, dino.y, 18, 18);
  ctx.fillRect(dino.x + 36, dino.y + 12, 12, 6);
  ctx.fillRect(dino.x + 10, dino.y + 38, 8, 10);
  ctx.fillRect(dino.x + 26, dino.y + 38, 8, 10);
  ctx.fillRect(dino.x, dino.y + 24, 12, 8);

  ctx.fillStyle = "#f7f7f7";
  ctx.fillRect(dino.x + 36, dino.y + 5, 3, 3);
}

function drawCactus(ob) {
  ctx.fillStyle = "#555";

  ctx.fillRect(ob.x + ob.width / 2 - 4, ob.y, 8, ob.height);
  ctx.fillRect(ob.x, ob.y + 14, 8, 22);
  ctx.fillRect(ob.x + ob.width - 8, ob.y + 8, 8, 26);
  ctx.fillRect(ob.x + 4, ob.y + 14, 10, 6);
  ctx.fillRect(ob.x + ob.width - 14, ob.y + 8, 10, 6);
}

function drawGround() {
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(0, 226);
  ctx.lineTo(canvas.width, 226);
  ctx.stroke();

  ctx.fillStyle = "#555";

  for (let i = 0; i < canvas.width; i += 38) {
    let x = (i + groundX) % canvas.width;
    if (x < 0) x += canvas.width;

    ctx.fillRect(x, 236, 8, 2);
    ctx.fillRect(x + 18, 242, 4, 2);
  }
}

function drawClouds() {
  ctx.strokeStyle = "#ccc";
  ctx.lineWidth = 2;

  clouds.forEach(cloud => {
    ctx.beginPath();
    ctx.moveTo(cloud.x, cloud.y + 12);
    ctx.lineTo(cloud.x + 12, cloud.y + 12);
    ctx.quadraticCurveTo(cloud.x + 18, cloud.y, cloud.x + 30, cloud.y + 8);
    ctx.quadraticCurveTo(cloud.x + 42, cloud.y, cloud.x + 54, cloud.y + 12);
    ctx.lineTo(cloud.x + 66, cloud.y + 12);
    ctx.stroke();
  });
}

function drawScore() {
  ctx.fillStyle = "#555";
  ctx.font = "20px monospace";

  const hi = "HI 002005";
  const puntos = ("00000" + score).slice(-5);

  ctx.fillText(hi + "  " + puntos, 555, 30);
  ctx.fillText("SALTOS " + jumps + "/20", 30, 30);
}

function drawStartScene() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGround();
  drawDino();
  drawScore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawClouds();
  drawGround();
  drawDino();
  obstacles.forEach(drawCactus);
  drawScore();
}

function loop() {
  if (!gameRunning) return;

  update();
  draw();

  animationId = requestAnimationFrame(loop);
}

dino = {
  x: 65,
  y: 178,
  width: 44,
  height: 48,
  velocityY: 0,
  jumping: false
};

drawStartScene();
</script>

</body>
</html>
