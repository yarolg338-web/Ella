<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Neon Runner</title>

<style>
.futuristic-card {
  width: 260px;
  height: 360px;
  border-radius: 28px;
  border: 3px solid #00e5ff;
  background:
    linear-gradient(135deg, rgba(0,229,255,.35), rgba(139,92,246,.25)),
    radial-gradient(circle at top, rgba(255,255,255,.3), transparent 45%),
    #07111f;
  box-shadow:
    0 0 25px #00e5ff,
    0 0 60px rgba(139,92,246,.8);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  animation: floatCard 2.4s ease-in-out infinite;
}

.card-shine {
  position: absolute;
  width: 80px;
  height: 520px;
  background: rgba(255,255,255,.35);
  transform: rotate(25deg);
  animation: shineMove 2.5s infinite;
}

.card-icon {
  font-size: 70px;
  color: #00e5ff;
  text-shadow: 0 0 25px #00e5ff;
}

.card-title {
  font-weight: bold;
  letter-spacing: 2px;
  font-size: 18px;
}

.card-subtitle {
  font-size: 14px;
  opacity: .8;
}

@keyframes floatCard {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes shineMove {
  from { left: -120px; }
  to { left: 330px; }
}

#cardBox {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, #020617, #000);
  justify-content: center;
  align-items: center;
  z-index: 50;
}

#cardBox img {
  width: 90vw;
  max-width: 520px;
  max-height: 90vh;
  border-radius: 25px;
  border: 3px solid #00e5ff;
  box-shadow:
    0 0 20px #00e5ff,
    0 0 50px #8b5cf6,
    0 0 90px rgba(0,229,255,.8);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="startScreen">
  <h1>NEON RUNNER</h1>
  <p>jj Salta los obstáculos, recoge monedas y llega al final para desbloquear el próximo nivel.</p>
  <p>PC: ESPACIO / ↑ | Celular: toca la pantalla</p>
  <button id="startBtn">Iniciar juego</button>
</div>

<div id="finalScreen">
  <div class="futuristic-card">
    <div class="card-shine"></div>
    <div class="card-icon">▣</div>
    <div class="card-title">NIVEL DESBLOQUEADO</div>
    <div class="card-subtitle">Archivo secreto disponible</div>
  </div>

  <button id="openCardBtn">Abrir carta</button>

  <div id="cardBox">
    <img src="carta.jpg" alt="Carta">
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H, groundY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.78;
}
resize();
window.addEventListener("resize", resize);

let gameStarted = false;
let gameOver = false;
let won = false;

let score = 0;
let coinsCount = 0;
let speed = 7;
let frame = 0;

const WIN_SCORE = 25;

const player = {
  x: 90,
  y: 0,
  w: 48,
  h: 58,
  vy: 0,
  jumping: false
};

player.y = groundY - player.h;

let obstacles = [];
let coins = [];
let particles = [];

const colors = {
  cyan: "#00e5ff",
  pink: "#ff3d81",
  yellow: "#ffcc00",
  purple: "#8b5cf6",
  green: "#00ff99"
};

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  gameStarted = true;
  loop();
}

document.getElementById("startBtn").addEventListener("click", startGame);

document.getElementById("openCardBtn").addEventListener("click", () => {
  document.getElementById("cardBox").style.display = "flex";
});

function jump(e) {
  if (e) e.preventDefault();

  if (!gameStarted) {
    startGame();
    return;
  }

  if (gameOver && !won) {
    restart();
    return;
  }

  if (!player.jumping && !gameOver) {
    player.vy = -18;
    player.jumping = true;
    createParticles(player.x + 20, player.y + player.h, colors.cyan, 12);
  }
}

window.addEventListener("pointerdown", jump, { passive: false });

window.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump(e);
  }
});

function createObstacle() {
  const type = Math.random() < 0.5 ? "block" : "spike";

  obstacles.push({
    x: W + 80,
    y: groundY - 50,
    w: type === "block" ? 44 : 54,
    h: type === "block" ? 50 : 45,
    type,
    color: Math.random() < 0.5 ? colors.pink : colors.purple,
    passed: false
  });
}

function createCoin() {
  coins.push({
    x: W + 80,
    y: groundY - rand(110, 180),
    r: 13,
    taken: false,
    angle: 0
  });
}

function createParticles(x, y, color, amount) {
  for (let i = 0; i < amount; i++) {
    particles.push({
      x,
      y,
      vx: rand(-4, 4),
      vy: rand(-5, 2),
      life: 35,
      color
    });
  }
}

function drawBackground() {
  const gradient = ctx.createLinearGradient(0, 0, 0, H);
  gradient.addColorStop(0, "#121242");
  gradient.addColorStop(0.55, "#18182f");
  gradient.addColorStop(1, "#050511");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 70; i++) {
    const x = (i * 97 + frame * 0.25) % W;
    const y = (i * 53) % (H * 0.55);
    ctx.fillStyle = i % 3 === 0 ? colors.cyan : "#ffffff";
    ctx.globalAlpha = 0.25;
    ctx.fillRect(x, y, 2, 2);
  }

  ctx.globalAlpha = 1;
  drawCity();
}

function drawCity() {
  for (let i = 0; i < 18; i++) {
    const bw = 70;
    const bh = 90 + (i % 5) * 28;
    const x = ((i * 95) - frame * 1.4) % (W + 120) - 80;
    const y = groundY - bh;

    ctx.fillStyle = "#11172f";
    ctx.fillRect(x, y, bw, bh);

    ctx.fillStyle = i % 2 === 0 ? colors.cyan : colors.pink;
    ctx.globalAlpha = 0.75;

    for (let wx = x + 12; wx < x + bw - 10; wx += 22) {
      for (let wy = y + 18; wy < groundY - 12; wy += 26) {
        ctx.fillRect(wx, wy, 7, 10);
      }
    }

    ctx.globalAlpha = 1;
  }
}

function drawGround() {
  ctx.fillStyle = "#0d1028";
  ctx.fillRect(0, groundY, W, H - groundY);

  ctx.strokeStyle = colors.cyan;
  ctx.lineWidth = 4;
  ctx.shadowColor = colors.cyan;
  ctx.shadowBlur = 18;

  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  ctx.shadowBlur = 0;

  for (let i = 0; i < 40; i++) {
    const x = ((i * 80) - frame * speed) % W;
    ctx.strokeStyle = i % 2 === 0 ? colors.pink : colors.yellow;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(x, groundY + 25);
    ctx.lineTo(x + 35, groundY + 25);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

function drawPlayer() {
  const x = player.x;
  const y = player.y;

  ctx.save();
  ctx.shadowColor = colors.cyan;
  ctx.shadowBlur = 20;

  ctx.fillStyle = "#ffffff";
  roundRect(x, y + 8, player.w, player.h - 8, 12);
  ctx.fill();

  ctx.fillStyle = colors.cyan;
  roundRect(x + 9, y + 17, 30, 15, 6);
  ctx.fill();

  ctx.fillStyle = "#111";
  ctx.fillRect(x + 17, y + 22, 5, 5);
  ctx.fillRect(x + 29, y + 22, 5, 5);

  ctx.fillStyle = colors.yellow;
  ctx.fillRect(x + 12, y + 45, 8, 15);
  ctx.fillRect(x + 30, y + 45, 8, 15);

  ctx.fillStyle = colors.pink;
  ctx.fillRect(x + 16, y, 16, 10);

  ctx.restore();
}

function drawObstacle(o) {
  ctx.save();
  ctx.shadowColor = o.color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = o.color;

  if (o.type === "block") {
    roundRect(o.x, o.y, o.w, o.h, 10);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.globalAlpha = 0.5;
    ctx.fillRect(o.x + 10, o.y + 10, o.w - 20, 6);
  } else {
    ctx.beginPath();
    ctx.moveTo(o.x, o.y + o.h);
    ctx.lineTo(o.x + o.w / 2, o.y);
    ctx.lineTo(o.x + o.w, o.y + o.h);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    ctx.moveTo(o.x + o.w / 2, o.y + 10);
    ctx.lineTo(o.x + o.w / 2 - 8, o.y + o.h - 8);
    ctx.lineTo(o.x + o.w / 2 + 8, o.y + o.h - 8);
    ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawCoin(c) {
  c.angle += 0.12;

  ctx.save();
  ctx.translate(c.x, c.y);
  ctx.scale(Math.abs(Math.cos(c.angle)) + 0.25, 1);

  ctx.shadowColor = colors.yellow;
  ctx.shadowBlur = 20;
  ctx.fillStyle = colors.yellow;

  ctx.beginPath();
  ctx.arc(0, 0, c.r, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#fff";
  ctx.font = "16px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("$", 0, 1);

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.18;
    p.life--;

    ctx.globalAlpha = Math.max(p.life / 35, 0);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 5, 5);
  });

  ctx.globalAlpha = 1;
  particles = particles.filter(p => p.life > 0);
}

function drawHUD() {
  ctx.fillStyle = "white";
  ctx.font = "bold 22px Arial";
  ctx.textAlign = "left";
  ctx.fillText("Puntos: " + score, 24, 38);
  ctx.fillText("Monedas: " + coinsCount, 24, 68);

  ctx.textAlign = "right";
  ctx.fillText("Meta: " + WIN_SCORE, W - 24, 38);
}

function updatePlayer() {
  player.vy += 0.85;
  player.y += player.vy;

  if (player.y >= groundY - player.h) {
    player.y = groundY - player.h;
    player.vy = 0;
    player.jumping = false;
  }
}

function updateObjects() {
  if (frame % 85 === 0) createObstacle();
  if (frame % 120 === 0) createCoin();

  obstacles.forEach(o => {
    o.x -= speed;

    if (collision(player, o)) {
      endGame();
    }

    if (!o.passed && o.x + o.w < player.x) {
      o.passed = true;
      score++;
      speed += 0.18;

      if (score >= WIN_SCORE) winGame();
    }
  });

  coins.forEach(c => {
    c.x -= speed;

    const coinBox = {
      x: c.x - c.r,
      y: c.y - c.r,
      w: c.r * 2,
      h: c.r * 2
    };

    if (!c.taken && collision(player, coinBox)) {
      c.taken = true;
      coinsCount++;
      createParticles(c.x, c.y, colors.yellow, 18);
    }
  });

  obstacles = obstacles.filter(o => o.x > -100);
  coins = coins.filter(c => c.x > -100 && !c.taken);
}

function endGame() {
  if (coinsCount > 0) {
    coinsCount--;

    createParticles(player.x, player.y, colors.green, 35);

    player.x = 90;
    player.y = groundY - player.h;
    player.vy = 0;
    player.jumping = false;

    obstacles = obstacles.filter(o => o.x < player.x - 150 || o.x > player.x + 250);

    return;
  }

  gameOver = true;

  ctx.fillStyle = "rgba(0,0,0,.65)";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.font = "bold 46px Arial";
  ctx.fillText("GAME OVER", W / 2, H / 2 - 35);

  ctx.font = "22px Arial";
  ctx.fillText("Sin monedas para continuar", W / 2, H / 2 + 10);
  ctx.fillText("Toca o presiona ESPACIO para reiniciar", W / 2, H / 2 + 45);
}

function winGame() {
  won = true;
  gameOver = true;
  document.getElementById("finalScreen").style.display = "flex";
}

function restart() {
  score = 0;
  coinsCount = 0;
  speed = 7;
  frame = 0;
  gameOver = false;
  won = false;
  obstacles = [];
  coins = [];
  particles = [];
  player.y = groundY - player.h;
  player.vy = 0;
  player.jumping = false;
  loop();
}

function collision(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function loop() {
  if (!gameStarted || gameOver) return;

  frame++;

  drawBackground();
  drawGround();

  updatePlayer();
  updateObjects();

  obstacles.forEach(drawObstacle);
  coins.forEach(drawCoin);

  drawPlayer();
  drawParticles();
  drawHUD();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
