<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dino Game</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f7f7f7;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let groundY = 0;
    let started = false;
    let gameOver = false;
    let score = 0;
    let hiScore = 0;
    let speed = 8;
    let gravity = 0.95;
    let obstacleTimer = 0;
    let nextObstacle = 85;
    let groundOffset = 0;

    const dino = {
      x: 70,
      y: 0,
      w: 56,
      h: 60,
      vy: 0,
      jumpPower: -16,
      grounded: true,
      runFrame: 0
    };

    const obstacles = [];
    const clouds = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      groundY = canvas.height * 0.68;
      dino.y = groundY - dino.h;
      createClouds();
    }

    function createClouds() {
      clouds.length = 0;
      for (let i = 0; i < 3; i++) {
        clouds.push({
          x: Math.random() * canvas.width,
          y: 60 + Math.random() * 120,
          speed: 0.7 + Math.random() * 0.4
        });
      }
    }

    function resetGame() {
      started = true;
      gameOver = false;
      score = 0;
      speed = 8;
      obstacleTimer = 0;
      nextObstacle = 75 + Math.random() * 40;
      groundOffset = 0;
      obstacles.length = 0;
      dino.vy = 0;
      dino.grounded = true;
      dino.runFrame = 0;
      dino.y = groundY - dino.h;
    }

    function jump() {
      if (!started) {
        resetGame();
      }

      if (gameOver) {
        resetGame();
        return;
      }

      if (dino.grounded) {
        dino.vy = dino.jumpPower;
        dino.grounded = false;
      }
    }

    function spawnObstacle() {
      const tall = Math.random() < 0.5;
      const obs = {
        x: canvas.width + 20,
        y: 0,
        w: tall ? 20 : 34,
        h: tall ? 50 : 36,
        tall
      };
      obs.y = groundY - obs.h;
      obstacles.push(obs);
    }

    function setGameOver() {
      gameOver = true;
      hiScore = Math.max(hiScore, score);
      dino.vy = 0;
    }

    function update() {
      if (!started || gameOver) return;

      dino.vy += gravity;
      dino.y += dino.vy;

      if (dino.y >= groundY - dino.h) {
        dino.y = groundY - dino.h;
        dino.vy = 0;
        dino.grounded = true;
      }

      dino.runFrame += 0.22;
      groundOffset += speed;

      obstacleTimer++;
      if (obstacleTimer >= nextObstacle) {
        spawnObstacle();
        obstacleTimer = 0;
        nextObstacle = 65 + Math.random() * 45;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.x -= speed;

        if (obs.x + obs.w < 0) {
          obstacles.splice(i, 1);
          score++;
          if (score % 5 === 0) speed += 0.25;
        }
      }

      clouds.forEach(cloud => {
        cloud.x -= cloud.speed;
        if (cloud.x < -80) {
          cloud.x = canvas.width + 40;
          cloud.y = 60 + Math.random() * 120;
        }
      });

      checkCollision();
    }

    function checkCollision() {
      for (const obs of obstacles) {
        const pad = 8;
        if (
          dino.x + pad < obs.x + obs.w &&
          dino.x + dino.w - pad > obs.x &&
          dino.y + pad < obs.y + obs.h &&
          dino.y + dino.h - pad > obs.y
        ) {
          setGameOver();
          return;
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawGround() {
      ctx.strokeStyle = "#555";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();

      for (let i = 0; i < canvas.width + 28; i += 28) {
        ctx.fillStyle = "#666";
        ctx.fillRect(i - (groundOffset % 28), groundY + 12, 10, 2);
      }
    }

    function drawCloud(cloud) {
      ctx.strokeStyle = "#d6d6d6";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cloud.x + 15, cloud.y + 10, 10, Math.PI, 0);
      ctx.arc(cloud.x + 30, cloud.y + 6, 14, Math.PI, 0);
      ctx.arc(cloud.x + 48, cloud.y + 10, 10, Math.PI, 0);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cloud.x + 6, cloud.y + 18);
      ctx.lineTo(cloud.x + 56, cloud.y + 18);
      ctx.stroke();
    }

    function drawDino() {
      const x = dino.x;
      const y = dino.y;
      const legSwing = !gameOver && dino.grounded ? Math.sin(dino.runFrame) * 4 : 0;

      ctx.fillStyle = "#555";

      // cola
      ctx.fillRect(x - 10, y + 30, 14, 6);
      ctx.fillRect(x - 16, y + 26, 8, 6);
      ctx.fillRect(x - 22, y + 22, 8, 6);

      // cuerpo
      ctx.fillRect(x + 4, y + 20, 28, 24);

      // panza
      ctx.fillRect(x + 8, y + 40, 20, 6);

      // cuello
      ctx.fillRect(x + 22, y + 10, 10, 14);

      // cabeza grande
      ctx.fillRect(x + 24, y, 20, 18);

      // hocico
      ctx.fillRect(x + 40, y + 8, 14, 8);

      // mandíbula
      ctx.fillRect(x + 42, y + 14, 10, 4);

      // brazo pequeño
      ctx.fillRect(x + 24, y + 26, 5, 10);
      ctx.fillRect(x + 27, y + 32, 6, 4);

      // ojo
      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(x + 30, y + 4, 3, 3);

      // boca
      ctx.fillStyle = "#555";
      ctx.fillRect(x + 44, y + 12, 8, 2);

      // piernas
      if (dino.grounded) {
        ctx.fillRect(x + 10, y + 44, 7, 14 + legSwing);
        ctx.fillRect(x + 22, y + 44, 7, 14 - legSwing);
      } else {
        ctx.fillRect(x + 10, y + 44, 7, 14);
        ctx.fillRect(x + 22, y + 44, 7, 14);
      }

      // pies
      ctx.fillRect(x + 8, y + 56 + legSwing, 10, 4);
      ctx.fillRect(x + 20, y + 56 - legSwing, 10, 4);
    }

    function drawObstacle(obs) {
      ctx.fillStyle = "#555";

      if (obs.tall) {
        ctx.fillRect(obs.x + 6, obs.y, 8, obs.h);
        ctx.fillRect(obs.x, obs.y + 16, 6, 14);
        ctx.fillRect(obs.x + 14, obs.y + 10, 6, 16);
      } else {
        ctx.fillRect(obs.x + 5, obs.y + 8, 8, obs.h - 8);
        ctx.fillRect(obs.x + 15, obs.y, 8, obs.h);
        ctx.fillRect(obs.x + 24, obs.y + 10, 8, obs.h - 10);
      }
    }

    function drawUI() {
      ctx.fillStyle = "#555";
      ctx.font = "20px Arial";
      ctx.fillText("HI " + String(hiScore).padStart(5, "0"), canvas.width - 240, 35);
      ctx.fillText(String(score).padStart(5, "0"), canvas.width - 110, 35);

      if (!started) {
        ctx.textAlign = "center";
        ctx.font = "30px Arial";
        ctx.fillText("DINO GAME", canvas.width / 2, canvas.height / 2 - 25);
        ctx.font = "18px Arial";
        ctx.fillText("Toca la pantalla o presiona espacio", canvas.width / 2, canvas.height / 2 + 12);
        ctx.textAlign = "left";
      }

      if (gameOver) {
        ctx.textAlign = "center";
        ctx.font = "32px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "18px Arial";
        ctx.fillText("Toca o presiona espacio para reiniciar", canvas.width / 2, canvas.height / 2 + 15);

        // X de game over tipo clásico
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#555";
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2 - 55, canvas.height / 2 - 65);
        ctx.lineTo(canvas.width / 2 - 35, canvas.height / 2 - 45);
        ctx.moveTo(canvas.width / 2 - 35, canvas.height / 2 - 65);
        ctx.lineTo(canvas.width / 2 - 55, canvas.height / 2 - 45);
        ctx.stroke();

        ctx.textAlign = "left";
      }
    }

    function draw() {
      drawBackground();
      clouds.forEach(drawCloud);
      drawGround();
      drawDino();
      obstacles.forEach(drawObstacle);
      drawUI();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    canvas.addEventListener("mousedown", (e) => {
      e.preventDefault();
      jump();
    });

    resizeCanvas();
    loop();
  </script>
</body>
</html>
