<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Juego tipo Dino</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      groundY = canvas.height * 0.68;
      dino.y = groundY - dino.height;
    }

    let groundY = 0;
    let gameSpeed = 7;
    let gravity = 0.9;
    let score = 0;
    let gameOver = false;
    let started = false;

    const dino = {
      x: 80,
      y: 0,
      width: 44,
      height: 48,
      vy: 0,
      jumpPower: -15,
      grounded: true,
      legFrame: 0
    };

    const obstacles = [];
    const clouds = [];

    function resetGame() {
      obstacles.length = 0;
      score = 0;
      gameSpeed = 7;
      gameOver = false;
      started = true;
      dino.vy = 0;
      dino.grounded = true;
      dino.y = groundY - dino.height;
    }

    function spawnClouds() {
      clouds.length = 0;
      for (let i = 0; i < 3; i++) {
        clouds.push({
          x: Math.random() * canvas.width,
          y: 70 + Math.random() * 120,
          w: 70 + Math.random() * 40,
          h: 20 + Math.random() * 10,
          speed: 1 + Math.random() * 0.5
        });
      }
    }

    function jump() {
      if (!started) {
        resetGame();
      }
      if (gameOver) {
        resetGame();
        return;
      }
      if (dino.grounded) {
        dino.vy = dino.jumpPower;
        dino.grounded = false;
      }
    }

    function spawnObstacle() {
      const type = Math.random() < 0.7 ? "cactus" : "small";
      const obstacle = {
        type,
        width: type === "cactus" ? 22 : 16,
        height: type === "cactus" ? 52 : 34,
        x: canvas.width + 20,
        y: 0
      };
      obstacle.y = groundY - obstacle.height;
      obstacles.push(obstacle);
    }

    let obstacleTimer = 0;
    let nextObstacle = 90;

    function update() {
      if (!started || gameOver) return;

      dino.vy += gravity;
      dino.y += dino.vy;

      if (dino.y >= groundY - dino.height) {
        dino.y = groundY - dino.height;
        dino.vy = 0;
        dino.grounded = true;
      }

      dino.legFrame += 0.25;

      obstacleTimer++;
      if (obstacleTimer > nextObstacle) {
        spawnObstacle();
        obstacleTimer = 0;
        nextObstacle = 70 + Math.random() * 55;
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;

        if (obstacles[i].x + obstacles[i].width < 0) {
          obstacles.splice(i, 1);
          score++;
          if (score % 5 === 0) {
            gameSpeed += 0.3;
          }
        }
      }

      for (const cloud of clouds) {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.w < 0) {
          cloud.x = canvas.width + 50;
          cloud.y = 70 + Math.random() * 120;
        }
      }

      checkCollision();
    }

    function checkCollision() {
      for (const obs of obstacles) {
        const padding = 6;
        if (
          dino.x + padding < obs.x + obs.width &&
          dino.x + dino.width - padding > obs.x &&
          dino.y + padding < obs.y + obs.height &&
          dino.y + dino.height - padding > obs.y
        ) {
          gameOver = true;
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#f3f3f3";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawGround() {
      ctx.strokeStyle = "#555";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(canvas.width, groundY);
      ctx.stroke();

      for (let i = 0; i < canvas.width; i += 32) {
        const offset = (performance.now() * 0.15) % 32;
        ctx.fillStyle = "#666";
        ctx.fillRect(i - offset, groundY + 14, 10, 2);
      }
    }

    function drawCloud(cloud) {
      ctx.strokeStyle = "#cfcfcf";
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.arc(cloud.x + 18, cloud.y + 12, 12, Math.PI, 0);
      ctx.arc(cloud.x + 35, cloud.y + 7, 16, Math.PI, 0);
      ctx.arc(cloud.x + 56, cloud.y + 12, 12, Math.PI, 0);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cloud.x + 6, cloud.y + 20);
      ctx.lineTo(cloud.x + 68, cloud.y + 20);
      ctx.stroke();
    }

    function drawDino() {
      const x = dino.x;
      const y = dino.y;
      const legOffset = dino.grounded ? Math.sin(dino.legFrame) * 4 : 0;

      ctx.fillStyle = "#555";

      // cuerpo
      ctx.fillRect(x + 10, y + 14, 24, 22);

      // cabeza
      ctx.fillRect(x + 20, y, 20, 18);

      // hocico
      ctx.fillRect(x + 34, y + 8, 12, 8);

      // cola
      ctx.fillRect(x, y + 22, 14, 6);
      ctx.fillRect(x - 6, y + 18, 8, 6);

      // cuello
      ctx.fillRect(x + 16, y + 10, 10, 10);

      // brazo
      ctx.fillRect(x + 26, y + 22, 6, 12);

      // ojo
      ctx.fillStyle = "#f3f3f3";
      ctx.fillRect(x + 28, y + 4, 4, 4);

      ctx.fillStyle = "#555";

      // piernas
      if (dino.grounded) {
        ctx.fillRect(x + 14, y + 36, 6, 12 + legOffset);
        ctx.fillRect(x + 26, y + 36, 6, 12 - legOffset);
      } else {
        ctx.fillRect(x + 14, y + 36, 6, 12);
        ctx.fillRect(x + 26, y + 36, 6, 12);
      }
    }

    function drawObstacle(obs) {
      ctx.fillStyle = "#555";

      if (obs.type === "cactus") {
        ctx.fillRect(obs.x + 8, obs.y, 8, obs.height);
        ctx.fillRect(obs.x, obs.y + 18, 8, 16);
        ctx.fillRect(obs.x + 14, obs.y + 10, 8, 18);
      } else {
        ctx.fillRect(obs.x + 4, obs.y, 8, obs.height);
        ctx.fillRect(obs.x, obs.y + 12, 6, 10);
      }
    }

    function drawUI() {
      ctx.fillStyle = "#555";
      ctx.font = "20px Arial";
      ctx.fillText("Puntos: " + score, canvas.width - 140, 40);

      if (!started) {
        ctx.textAlign = "center";
        ctx.font = "28px Arial";
        ctx.fillText("Toca la pantalla o presiona espacio", canvas.width / 2, canvas.height / 2 - 10);
        ctx.font = "18px Arial";
        ctx.fillText("para comenzar", canvas.width / 2, canvas.height / 2 + 25);
        ctx.textAlign = "left";
      }

      if (gameOver) {
        ctx.textAlign = "center";
        ctx.font = "34px Arial";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px Arial";
        ctx.fillText("Toca o presiona espacio para reiniciar", canvas.width / 2, canvas.height / 2 + 20);
        ctx.textAlign = "left";
      }
    }

    function draw() {
      drawBackground();

      for (const cloud of clouds) {
        drawCloud(cloud);
      }

      drawGround();
      drawDino();

      for (const obs of obstacles) {
        drawObstacle(obs);
      }

      drawUI();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }
    });

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    canvas.addEventListener("mousedown", (e) => {
      e.preventDefault();
      jump();
    });

    resizeCanvas();
    spawnClouds();
    loop();
  </script>
</body>
</html>
