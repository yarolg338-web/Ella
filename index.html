<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Un pequeño reto</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f1220;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 24px;
      color: #fff6ef;
      z-index: 20;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(to bottom, rgba(8,10,20,0.25), rgba(8,10,20,0.55));
    }

    .screen.active {
      display: flex;
    }

    .card {
      width: min(90vw, 360px);
      background: rgba(18, 22, 36, 0.88);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    h1, h2, p {
      margin: 0;
    }

    h1, h2 {
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    p {
      margin-top: 12px;
      line-height: 1.5;
      color: #e7dfe0;
    }

    .btn {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #ff7aa2, #ff9f7a);
      box-shadow: 0 10px 30px rgba(255, 120, 160, 0.35);
    }

    .btn:active {
      transform: scale(0.98);
    }

    #letterScreen {
      background: #111;
      padding: 0;
    }

    #letterScreen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111;
    }

    .envelope {
      width: 220px;
      height: 150px;
      position: relative;
      margin: 6px 0 12px;
      cursor: pointer;
      animation: floaty 1.8s ease-in-out infinite;
    }

    .env-back {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100px;
      background: #f2d5b5;
      border-radius: 0 0 18px 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
    }

    .env-front {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100px;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 0 0, 50% 55%, 100% 0);
      background: #e5bd93;
      border-radius: 0 0 18px 18px;
    }

    .env-flap {
      position: absolute;
      top: 16px;
      left: 0;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 75px solid #d9ae80;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 72px;
      transform: translateX(-50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #d45252, #8d1f1f);
      z-index: 3;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="startScreen" class="screen active">
    <div class="card">
      <h1>Un pequeño reto</h1>
      <p>Solo toca la pantalla para saltar.<br>Si llegas al final, hay una sorpresa.</p>
      <button class="btn" id="startBtn">Empezar</button>
    </div>
  </div>

  <div id="gameOverScreen" class="screen">
    <div class="card">
      <h2>Casi…</h2>
      <p>Te faltó poquito. Inténtalo otra vez.</p>
      <button class="btn" id="retryBtn">Reintentar</button>
    </div>
  </div>

  <div id="winScreen" class="screen">
    <div class="card">
      <div class="envelope" id="openEnvelope">
        <div class="env-flap"></div>
        <div class="env-back"></div>
        <div class="env-front"></div>
        <div class="seal"></div>
      </div>
      <h2>Tienes algo para abrir</h2>
      <p>Toca la carta.</p>
      <button class="btn" id="openBtn">Abrir</button>
    </div>
  </div>

  <div id="letterScreen" class="screen">
    <img src="carta.jpg" alt="Carta sorpresa">
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const winScreen = document.getElementById("winScreen");
    const letterScreen = document.getElementById("letterScreen");

    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");
    const openBtn = document.getElementById("openBtn");
    const openEnvelope = document.getElementById("openEnvelope");

    let W = 0;
    let H = 0;
    let groundY = 0;
    let animationId = 0;

    const GOAL = 30;
    let score = 0;
    let speed = 7;
    let running = false;
    let started = false;
    let gameOver = false;
    let won = false;
    let obstacleTimer = 0;
    let nextObstacle = 75;
    let groundOffset = 0;

    const stars = [];
    const hills = [];
    const obstacles = [];
    const particles = [];
    const fireflies = [];

    const player = {
      x: 90,
      y: 0,
      w: 54,
      h: 54,
      vy: 0,
      gravity: 0.88,
      jumpPower: -15.5,
      grounded: true,
      frame: 0
    };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      groundY = H * 0.78;
      player.y = groundY - player.h;
      buildBackground();
    }

    function buildBackground() {
      stars.length = 0;
      hills.length = 0;
      fireflies.length = 0;

      for (let i = 0; i < 40; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * (H * 0.45),
          r: Math.random() * 1.8 + 0.4,
          a: Math.random() * 0.6 + 0.2
        });
      }

      for (let i = 0; i < 3; i++) {
        hills.push({
          x: i * (W / 2),
          h: 70 + Math.random() * 50
        });
      }

      for (let i = 0; i < 10; i++) {
        fireflies.push({
          x: Math.random() * W,
          y: H * 0.45 + Math.random() * (H * 0.25),
          r: 1 + Math.random() * 2,
          dx: 0.2 + Math.random() * 0.4,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function showScreen(screen) {
      [startScreen, gameOverScreen, winScreen, letterScreen].forEach(s => s.classList.remove("active"));
      if (screen) screen.classList.add("active");
    }

    function resetGame() {
      score = 0;
      speed = 7;
      running = true;
      started = true;
      gameOver = false;
      won = false;
      obstacleTimer = 0;
      nextObstacle = 70 + Math.random() * 30;
      groundOffset = 0;
      obstacles.length = 0;
      particles.length = 0;

      player.vy = 0;
      player.grounded = true;
      player.y = groundY - player.h;
      player.frame = 0;

      showScreen(null);
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(loop);
    }

    function startGame() {
      resetGame();
    }

    function jump() {
      if (!started) {
        startGame();
        return;
      }

      if (gameOver) {
        resetGame();
        return;
      }

      if (won) return;

      if (player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;

        for (let i = 0; i < 8; i++) {
          particles.push({
            x: player.x + 12,
            y: groundY + 2,
            vx: -1 - Math.random() * 2,
            vy: -0.5 - Math.random() * 1.5,
            size: 2 + Math.random() * 3,
            life: 18 + Math.random() * 8
          });
        }
      }
    }

    function spawnObstacle() {
      const types = ["thorn", "stone", "log"];
      const type = types[Math.floor(Math.random() * types.length)];
      let w = 0, h = 0;

      if (type === "thorn") { w = 26; h = 28; }
      if (type === "stone") { w = 32; h = 22; }
      if (type === "log")   { w = 44; h = 18; }

      obstacles.push({
        type,
        x: W + 20,
        y: groundY - h,
        w,
        h
      });

      obstacleTimer = 0;
      nextObstacle = Math.max(48, 82 - score * 0.8) + Math.random() * 28;
    }

    function setGameOver() {
      running = false;
      gameOver = true;
      cancelAnimationFrame(animationId);
      showScreen(gameOverScreen);
    }

    function setWin() {
      running = false;
      won = true;
      cancelAnimationFrame(animationId);
      showScreen(winScreen);
    }

    function update() {
      if (!running) return;

      player.vy += player.gravity;
      player.y += player.vy;

      const floor = groundY - player.h;
      if (player.y >= floor) {
        player.y = floor;
        player.vy = 0;
        player.grounded = true;
      }

      player.frame += 0.22;
      groundOffset += speed;

      obstacleTimer++;
      if (obstacleTimer >= nextObstacle) spawnObstacle();

      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.x -= speed;

        if (o.x + o.w < 0) {
          obstacles.splice(i, 1);
          score++;
          if (score % 5 === 0) speed += 0.35;
          if (score >= GOAL) {
            setWin();
            return;
          }
        } else if (collides(player, o)) {
          setGameOver();
          return;
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      fireflies.forEach(f => {
        f.x -= f.dx;
        f.phase += 0.04;
        if (f.x < -10) {
          f.x = W + 10;
          f.y = H * 0.45 + Math.random() * (H * 0.25);
        }
      });
    }

    function collides(a, b) {
      const padX = 10;
      const padY = 8;
      return (
        a.x + padX < b.x + b.w &&
        a.x + a.w - padX > b.x &&
        a.y + padY < b.y + b.h &&
        a.y + a.h - padY > b.y
      );
    }

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#10162f");
      g.addColorStop(0.55, "#1d2340");
      g.addColorStop(1, "#2c2142");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // luna
      ctx.fillStyle = "rgba(255,245,220,0.9)";
      ctx.beginPath();
      ctx.arc(W - 90, 90, 34, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(230,220,255,0.12)";
      ctx.beginPath();
      ctx.arc(W - 78, 82, 30, 0, Math.PI * 2);
      ctx.fill();

      // estrellas
      stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawHills() {
      ctx.fillStyle = "#221a35";
      for (let i = 0; i < hills.length; i++) {
        const x = ((i * (W / 2)) - (groundOffset * 0.15) % (W * 1.5));
        ctx.beginPath();
        ctx.moveTo(x - 100, groundY);
        ctx.quadraticCurveTo(x + 80, groundY - hills[i].h, x + 250, groundY);
        ctx.fill();
      }

      ctx.fillStyle = "#182033";
      ctx.fillRect(0, groundY, W, H - groundY);
    }

    function drawGround() {
      ctx.fillStyle = "#30415f";
      ctx.fillRect(0, groundY, W, 4);

      for (let i = 0; i < W + 40; i += 30) {
        ctx.fillStyle = "#4d6187";
        ctx.fillRect(i - (groundOffset % 30), groundY + 12, 12, 3);
      }
    }

    function drawFireflies() {
      fireflies.forEach(f => {
        const alpha = 0.35 + Math.sin(f.phase) * 0.25;
        ctx.fillStyle = `rgba(255, 235, 140, ${alpha})`;
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawPlayer() {
      const x = player.x;
      const y = player.y;
      const bounce = player.grounded ? Math.sin(player.frame * 2.8) * 1.5 : 0;
      const leg = player.grounded ? Math.sin(player.frame * 5) * 4 : 0;

      // sombra
      ctx.fillStyle = "rgba(0,0,0,0.22)";
      ctx.beginPath();
      ctx.ellipse(x + 24, groundY + 12, 20, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // cuerpo del zorro/gatito estilizado
      ctx.fillStyle = "#ffb36b";
      ctx.beginPath();
      ctx.roundRect(x + 8, y + 18 + bounce, 26, 18, 8);
      ctx.fill();

      // cabeza
      ctx.beginPath();
      ctx.roundRect(x + 24, y + 8 + bounce, 20, 18, 8);
      ctx.fill();

      // orejas
      ctx.beginPath();
      ctx.moveTo(x + 28, y + 10 + bounce);
      ctx.lineTo(x + 31, y + 2 + bounce);
      ctx.lineTo(x + 35, y + 10 + bounce);
      ctx.closePath();
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(x + 38, y + 10 + bounce);
      ctx.lineTo(x + 41, y + 2 + bounce);
      ctx.lineTo(x + 44, y + 10 + bounce);
      ctx.closePath();
      ctx.fill();

      // cola
      ctx.strokeStyle = "#ffb36b";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x + 10, y + 24 + bounce);
      ctx.quadraticCurveTo(x - 6, y + 14 + bounce, x - 2, y + 34 + bounce);
      ctx.stroke();

      // vientre
      ctx.fillStyle = "#ffe5c7";
      ctx.beginPath();
      ctx.roundRect(x + 18, y + 22 + bounce, 12, 12, 6);
      ctx.fill();

      // ojo
      ctx.fillStyle = "#1d2233";
      ctx.fillRect(x + 36, y + 15 + bounce, 3, 3);

      // hocico
      ctx.fillStyle = "#ffe5c7";
      ctx.beginPath();
      ctx.roundRect(x + 39, y + 17 + bounce, 8, 5, 3);
      ctx.fill();

      // patas
      ctx.strokeStyle = "#ffb36b";
      ctx.lineWidth = 6;
      ctx.beginPath();
      if (player.grounded) {
        ctx.moveTo(x + 16, y + 35 + bounce);
        ctx.lineTo(x + 14, y + 50 + bounce + leg * 0.3);
        ctx.moveTo(x + 28, y + 35 + bounce);
        ctx.lineTo(x + 30, y + 50 + bounce - leg * 0.3);
      } else {
        ctx.moveTo(x + 16, y + 35 + bounce);
        ctx.lineTo(x + 13, y + 48 + bounce);
        ctx.moveTo(x + 28, y + 35 + bounce);
        ctx.lineTo(x + 31, y + 48 + bounce);
      }
      ctx.stroke();
    }

    function drawObstacle(o) {
      if (o.type === "thorn") {
        ctx.fillStyle = "#8c6bb3";
        ctx.beginPath();
        ctx.moveTo(o.x, o.y + o.h);
        ctx.lineTo(o.x + 6, o.y + 8);
        ctx.lineTo(o.x + 14, o.y + o.h);
        ctx.lineTo(o.x + 20, o.y + 4);
        ctx.lineTo(o.x + 26, o.y + o.h);
        ctx.closePath();
        ctx.fill();
      }

      if (o.type === "stone") {
        ctx.fillStyle = "#7b83a8";
        ctx.beginPath();
        ctx.roundRect(o.x, o.y, o.w, o.h, 10);
        ctx.fill();
      }

      if (o.type === "log") {
        ctx.fillStyle = "#8e5f4d";
        ctx.beginPath();
        ctx.roundRect(o.x, o.y, o.w, o.h, 12);
        ctx.fill();

        ctx.fillStyle = "#a87760";
        ctx.fillRect(o.x + 6, o.y + 4, o.w - 12, 3);
      }
    }

    function drawParticles() {
      ctx.fillStyle = "rgba(255, 215, 160, 0.7)";
      particles.forEach(p => {
        ctx.fillRect(p.x, p.y, p.size, p.size);
      });
    }

    function drawUI() {
      // barra de progreso
      const barW = Math.min(220, W * 0.48);
      const x = 16;
      const y = 18;
      const progress = Math.min(score / GOAL, 1);

      ctx.fillStyle = "rgba(255,255,255,0.15)";
      ctx.beginPath();
      ctx.roundRect(x, y, barW, 14, 8);
      ctx.fill();

      ctx.fillStyle = "#ff8fb1";
      ctx.beginPath();
      ctx.roundRect(x, y, barW * progress, 14, 8);
      ctx.fill();

      ctx.fillStyle = "#fff2f6";
      ctx.font = "bold 16px Arial";
      ctx.fillText(`${score}/${GOAL}`, x + barW + 10, y + 12);
    }

    function drawIntroHint() {
      if (!started) {
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.textAlign = "center";
        ctx.font = "bold 26px Arial";
        ctx.fillText("Toca para empezar", W / 2, H / 2);
        ctx.font = "16px Arial";
        ctx.fillText("Salta y llega al final", W / 2, H / 2 + 28);
        ctx.textAlign = "left";
      }
    }

    function draw() {
      drawSky();
      drawHills();
      drawFireflies();
      drawGround();
      drawParticles();
      drawPlayer();
      obstacles.forEach(drawObstacle);
      drawUI();
      drawIntroHint();
    }

    function loop() {
      update();
      draw();
      if (running) animationId = requestAnimationFrame(loop);
    }

    function openLetter() {
      showScreen(letterScreen);
    }

    window.addEventListener("resize", resize);

    startBtn.addEventListener("click", startGame);
    retryBtn.addEventListener("click", resetGame);
    openBtn.addEventListener("click", openLetter);
    openEnvelope.addEventListener("click", openLetter);

    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    canvas.addEventListener("mousedown", (e) => {
      e.preventDefault();
      jump();
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }
    });

    resize();
    draw();
  </script>
</body>
</html>
