<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sin conexión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="screen">
  <h1>Sin conexión</h1>
  <p>Presiona espacio para comenzar</p>
  <button onclick="startGame()">Jugar</button>
</div>

<canvas id="gameCanvas" width="800" height="260"></canvas>

<div id="gameOverScreen" class="screen hidden">
  <h2>Game Over</h2>
  <button onclick="restartGame()">Reintentar</button>
</div>

<div id="finalScreen" class="screen hidden">
  <h1>Has desbloqueado algo</h1>

  <!-- CAMBIA SOLO ESTO SI ES PNG -->
  <img src="assets/carta.jpg" alt="Sorpresa" class="final-img">

</div>

<script src="game.js"></script>
</body>
</html>
