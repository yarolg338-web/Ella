<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dino Sorpresa ❤️</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  overflow: hidden;
  text-align: center;
}

#game {
  display: block;
  margin: 40px auto 0;
  background: #fff;
  border: 3px solid #222;
  border-radius: 14px;
  width: 95%;
  max-width: 900px;
  height: auto;
  touch-action: manipulation;
}

#info {
  margin-top: 10px;
  font-size: 16px;
  color: #333;
}

#final {
  display: none;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #fff0f6, #ffffff);
  z-index: 10;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 24px;
  animation: aparecer 1s ease;
}

#final h1 {
  font-size: 42px;
  margin: 10px 0;
}

#final h2 {
  font-size: 28px;
  color: #d6336c;
  margin: 10px 0;
}

#final p {
  font-size: 20px;
  max-width: 600px;
}

#final img {
  margin-top: 18px;
  max-width: 85%;
  max-height: 45vh;
  border-radius: 24px;
  box-shadow: 0 12px 30px rgba(0,0,0,.25);
}

#restart {
  margin-top: 22px;
  padding: 14px 22px;
  border: none;
  border-radius: 999px;
  background: #d6336c;
  color: white;
  font-size: 17px;
  cursor: pointer;
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(.95); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<canvas id="game" width="900" height="260"></canvas>
<div id="info">Toca la pantalla o presiona ESPACIO / ↑ para saltar</div>

<div id="final">
  <h1>💖 Sorpresa 💖</h1>
  <p>Lo lograste… pero el verdadero premio era llegar hasta aquí.</p>
  <h2>Te amo muchísimo ❤️</h2>

  <!-- CAMBIA ESTA IMAGEN POR TU FOTO -->
  <img src="sorpresa.jpg" alt="Imagen sorpresa">

  <button id="restart">Jugar otra vez</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W = canvas.width;
let H = canvas.height;

let groundY = 205;
let score = 0;
let bestScore = localStorage.getItem("bestScoreDinoLove") || 0;
let speed = 6;
let gravity = 0.8;
let gameRunning = true;
let won = false;
let frame = 0;

const WIN_SCORE = 15; // CAMBIA AQUÍ CUÁNTOS PUNTOS NECESITA PARA GANAR

const player = {
  x: 70,
  y: groundY - 45,
  w: 42,
  h: 45,
  vy: 0,
  jumping: false
};

let obstacles = [];
let clouds = [
  {x: 160, y: 45, s: 1},
  {x: 430, y: 65, s: .8},
  {x: 700, y: 40, s: 1.1}
];

function drawGround() {
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  ctx.fillStyle = "#999";
  for (let i = 0; i < 35; i++) {
    let x = (i * 37 - frame * speed * 0.4) % W;
    if (x < 0) x += W;
    ctx.fillRect(x, groundY + 8 + (i % 3) * 4, 3, 2);
  }
}

function drawCloud(c) {
  ctx.strokeStyle = "#bbb";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(c.x, c.y, 12 * c.s, Math.PI, 2 * Math.PI);
  ctx.arc(c.x + 18 * c.s, c.y - 7 * c.s, 14 * c.s, Math.PI, 2 * Math.PI);
  ctx.arc(c.x + 38 * c.s, c.y, 12 * c.s, Math.PI, 2 * Math.PI);
  ctx.stroke();
}

function drawPlayer() {
  ctx.fillStyle = "#222";

  // cuerpo
  ctx.fillRect(player.x, player.y + 12, 28, 25);

  // cabeza
  ctx.fillRect(player.x + 22, player.y, 25, 22);

  // ojo
  ctx.fillStyle = "#fff";
  ctx.fillRect(player.x + 38, player.y + 6, 4, 4);
  ctx.fillStyle = "#222";

  // pierna animada
  if (frame % 20 < 10) {
    ctx.fillRect(player.x + 5, player.y + 36, 8, 14);
    ctx.fillRect(player.x + 22, player.y + 36, 8, 10);
  } else {
    ctx.fillRect(player.x + 5, player.y + 36, 8, 10);
    ctx.fillRect(player.x + 22, player.y + 36, 8, 14);
  }

  // cola
  ctx.fillRect(player.x - 12, player.y + 25, 16, 8);
}

function createObstacle() {
  const type = Math.random() < 0.5 ? "cactus" : "heart";
  obstacles.push({
    x: W + 30,
    y: groundY - 38,
    w: 24,
    h: 38,
    type: type,
    passed: false
  });
}

function drawObstacle(o) {
  if (o.type === "heart") {
    ctx.fillStyle = "#d6336c";
    ctx.beginPath();
    ctx.moveTo(o.x + 12, o.y + 32);
    ctx.bezierCurveTo(o.x - 10, o.y + 14, o.x + 2, o.y - 4, o.x + 12, o.y + 8);
    ctx.bezierCurveTo(o.x + 22, o.y - 4, o.x + 34, o.y + 14, o.x + 12, o.y + 32);
    ctx.fill();
  } else {
    ctx.fillStyle = "#222";
    ctx.fillRect(o.x + 8, o.y, 10, 38);
    ctx.fillRect(o.x, o.y + 15, 10, 7);
    ctx.fillRect(o.x + 17, o.y + 8, 10, 7);
  }
}

function collision(a, b) {
  return (
    a.x < b.x + b.w &&
    a.x + a.w > b.x &&
    a.y < b.y + b.h &&
    a.y + a.h > b.y
  );
}

function jump() {
  if (!player.jumping && gameRunning) {
    player.vy = -15;
    player.jumping = true;
  }

  if (!gameRunning && !won) {
    restartGame();
  }
}

function showFinal() {
  won = true;
  gameRunning = false;
  document.getElementById("final").style.display = "flex";
}

function gameOver() {
  gameRunning = false;
  ctx.fillStyle = "#222";
  ctx.font = "28px Arial";
  ctx.fillText("Perdiste 😅", W / 2 - 70, 100);
  ctx.font = "18px Arial";
  ctx.fillText("Toca o presiona ESPACIO para intentar otra vez", W / 2 - 180, 135);
}

function restartGame() {
  score = 0;
  speed = 6;
  obstacles = [];
  frame = 0;
  won = false;
  gameRunning = true;
  player.y = groundY - player.h;
  player.vy = 0;
  player.jumping = false;
  document.getElementById("final").style.display = "none";
  requestAnimationFrame(loop);
}

function loop() {
  if (!gameRunning) return;

  frame++;
  ctx.clearRect(0, 0, W, H);

  clouds.forEach(c => {
    c.x -= speed * 0.15;
    if (c.x < -80) c.x = W + 80;
    drawCloud(c);
  });

  drawGround();

  player.vy += gravity;
  player.y += player.vy;

  if (player.y >= groundY - player.h) {
    player.y = groundY - player.h;
    player.vy = 0;
    player.jumping = false;
  }

  if (frame % 90 === 0) createObstacle();

  obstacles.forEach(o => {
    o.x -= speed;
    drawObstacle(o);

    if (!o.passed && o.x + o.w < player.x) {
      o.passed = true;
      score++;
      speed += 0.25;

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScoreDinoLove", bestScore);
      }

      if (score >= WIN_SCORE) {
        showFinal();
      }
    }

    if (collision(player, o)) {
      gameOver();
    }
  });

  obstacles = obstacles.filter(o => o.x > -60);

  drawPlayer();

  ctx.fillStyle = "#222";
  ctx.font = "18px Arial";
  ctx.fillText("Puntos: " + score, W - 140, 30);
  ctx.fillText("Récord: " + bestScore, W - 140, 55);

  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  jump();
});

canvas.addEventListener("mousedown", jump);

document.getElementById("restart").addEventListener("click", restartGame);

loop();
</script>

</body>
</html>
