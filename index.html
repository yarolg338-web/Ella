<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Sorpresa</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#111;
}

canvas{
  display:block;
  width:100vw;
  height:100vh;
  touch-action:none;
}

.screen{
  position:fixed;
  inset:0;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:25px;
  color:white;
}

#inicio{
  background:linear-gradient(135deg,#4f46e5,#06b6d4,#22c55e);
}

#inicio h1{
  font-size:clamp(42px,8vw,80px);
  margin:0 0 15px;
}

#inicio p{
  font-size:20px;
  max-width:650px;
}

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
}

#btnInicio{
  margin-top:25px;
  padding:18px 34px;
  border-radius:999px;
  font-size:22px;
  background:#ffdd00;
  color:#111;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

#final{
  display:none;
  background:linear-gradient(135deg,#111827,#1e293b);
}

#final h1{
  font-size:clamp(30px,6vw,58px);
  margin-bottom:10px;
}

#final p{
  font-size:22px;
  max-width:700px;
}

.sobre{
  width:260px;
  height:170px;
  background:#facc15;
  margin-top:25px;
  position:relative;
  border-radius:10px;
  box-shadow:0 15px 35px rgba(0,0,0,.45);
  animation:flotar 1.8s infinite ease-in-out;
}

.sobre:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,transparent 49%,#eab308 50%);
  clip-path:polygon(0 0,50% 55%,100% 0,100% 100%,0 100%);
  border-radius:10px;
}

.sobre:after{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:#fde047;
  clip-path:polygon(0 0,50% 58%,100% 0,50% 45%);
  border-radius:10px;
  transform-origin:top;
}

#btnAbrir{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-35%);
  z-index:3;
  padding:13px 26px;
  border-radius:999px;
  font-size:20px;
  background:white;
  color:#111;
}

#imagenFinal{
  display:none;
  max-width:88vw;
  max-height:65vh;
  border-radius:22px;
  margin-top:20px;
  box-shadow:0 0 35px rgba(255,255,255,.35);
}

@keyframes flotar{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="inicio" class="screen">
  <h1>RUNNER CHALLENGE</h1>
  <p>Salta los obstáculos tocando la pantalla o presionando espacio. Completa los 20 obstáculos para desbloquear la sorpresa.</p>
  <button id="btnInicio">Comenzar ahora</button>
</div>

<div id="final" class="screen">
  <h1>¡Felicidades!</h1>
  <p>Tienes esta carta. Ábrela.</p>

  <div class="sobre" id="sobre">
    <button id="btnAbrir">Abrir</button>
  </div>

  <img id="imagenFinal" src="sorpresa.jpg" alt="Carta sorpresa">
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let W,H,suelo;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  suelo=H*0.78;
}
resize();
addEventListener("resize",resize);

let frame=0;
let velocidad=9;
let gravedad=1.05;
let completados=0;
let jugando=false;
let terminado=false;

const jugador={
  x:100,
  y:0,
  ancho:46,
  alto:86,
  vy:0,
  saltando:false
};

jugador.y=suelo-jugador.alto;

let obstaculos=[];

function iniciar(){
  document.getElementById("inicio").style.display="none";
  jugando=true;
  loop();
}

document.getElementById("btnInicio").addEventListener("click",iniciar);

function saltar(e){
  if(e)e.preventDefault();
  if(!jugando||terminado)return;

  if(!jugador.saltando){
    jugador.vy=-21;
    jugador.saltando=true;
  }
}

addEventListener("pointerdown",saltar,{passive:false});

addEventListener("keydown",e=>{
  if(e.code==="Space"||e.code==="ArrowUp"){
    saltar(e);
  }
});

function crearObstaculo(){
  const alto=50+Math.random()*35;
  obstaculos.push({
    x:W+80,
    y:suelo-alto,
    ancho:38+Math.random()*18,
    alto:alto,
    pasado:false,
    color:["#ef4444","#f97316","#8b5cf6","#06b6d4"][Math.floor(Math.random()*4)]
  });
}

function fondo(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#60a5fa");
  g.addColorStop(.55,"#93c5fd");
  g.addColorStop(1,"#22c55e");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle="rgba(255,255,255,.8)";
  for(let i=0;i<6;i++){
    let x=(i*230-frame*1.1)%(W+250)-120;
    let y=70+(i%3)*55;
    nube(x,y);
  }

  ctx.fillStyle="#16a34a";
  ctx.fillRect(0,suelo,W,H-suelo);

  ctx.fillStyle="#15803d";
  ctx.fillRect(0,suelo,W,10);
}

function nube(x,y){
  ctx.beginPath();
  ctx.arc(x,y,25,0,Math.PI*2);
  ctx.arc(x+30,y-12,33,0,Math.PI*2);
  ctx.arc(x+65,y,25,0,Math.PI*2);
  ctx.fill();
}

function muneco(){
  const x=jugador.x;
  const y=jugador.y;

  ctx.fillStyle="#facc15";
  ctx.beginPath();
  ctx.arc(x+23,y+18,17,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#111";
  ctx.beginPath();
  ctx.arc(x+23,y+9,18,Math.PI,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="#2563eb";
  ctx.fillRect(x+8,y+36,30,34);

  ctx.strokeStyle="#facc15";
  ctx.lineWidth=7;
  ctx.lineCap="round";
  ctx.beginPath();

  if(frame%16<8){
    ctx.moveTo(x+10,y+43); ctx.lineTo(x-8,y+58);
    ctx.moveTo(x+36,y+43); ctx.lineTo(x+54,y+55);
  }else{
    ctx.moveTo(x+10,y+43); ctx.lineTo(x-7,y+50);
    ctx.moveTo(x+36,y+43); ctx.lineTo(x+53,y+63);
  }
  ctx.stroke();

  ctx.strokeStyle="#111";
  ctx.lineWidth=8;
  ctx.beginPath();

  if(jugador.saltando){
    ctx.moveTo(x+16,y+69); ctx.lineTo(x+4,y+85);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+45,y+85);
  }else if(frame%16<8){
    ctx.moveTo(x+16,y+69); ctx.lineTo(x+4,y+88);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+47,y+82);
  }else{
    ctx.moveTo(x+16,y+69); ctx.lineTo(x,y+80);
    ctx.moveTo(x+31,y+69); ctx.lineTo(x+42,y+88);
  }
  ctx.stroke();

  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.arc(x+31,y+18,3,0,Math.PI*2);
  ctx.fill();
}

function obstaculo(o){
  ctx.fillStyle=o.color;
  ctx.fillRect(o.x,o.y,o.ancho,o.alto);

  ctx.fillStyle="rgba(255,255,255,.35)";
  ctx.fillRect(o.x+6,o.y+6,o.ancho-12,8);
}

function colision(a,b){
  return(
    a.x<b.x+b.ancho &&
    a.x+a.ancho>b.x &&
    a.y<b.y+b.alto &&
    a.y+a.alto>b.y
  );
}

function perder(){
  location.reload();
}

function ganar(){
  terminado=true;
  jugando=false;
  document.getElementById("final").style.display="flex";
}

function loop(){
  if(!jugando||terminado)return;

  frame++;
  fondo();

  jugador.vy+=gravedad;
  jugador.y+=jugador.vy;

  if(jugador.y>=suelo-jugador.alto){
    jugador.y=suelo-jugador.alto;
    jugador.vy=0;
    jugador.saltando=false;
  }

  if(frame%78===0){
    crearObstaculo();
  }

  obstaculos.forEach(o=>{
    o.x-=velocidad;
    obstaculo(o);

    if(!o.pasado&&o.x+o.ancho<jugador.x){
      o.pasado=true;
      completados++;
      velocidad+=0.18;
    }

    if(colision(jugador,o)){
      perder();
    }
  });

  obstaculos=obstaculos.filter(o=>o.x>-100);

  muneco();

  ctx.fillStyle="#111";
  ctx.font="bold 25px Arial";
  ctx.fillText("Obstáculos: "+completados+" / 20",25,42);

  if(completados>=20){
    ganar();
    return;
  }

  requestAnimationFrame(loop);
}

document.getElementById("btnAbrir").addEventListener("click",()=>{
  document.getElementById("sobre").style.display="none";
  document.getElementById("imagenFinal").style.display="block";
});
</script>

</body>
</html>
