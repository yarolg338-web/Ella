<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Neon Runner</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #080818;
  color: white;
}

#game {
  width: 100vw;
  height: 100vh;
  display: block;
  touch-action: none;
}

/* Pantallas */
#startScreen, #finalScreen {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 25px;
  background: radial-gradient(circle at top, #273cff, #080818 65%);
}

#finalScreen {
  display: none;
  background: radial-gradient(circle at top, #00e5ff, #111428 70%);
}

h1 {
  font-size: clamp(40px, 8vw, 80px);
  text-shadow: 0 0 20px #00e5ff;
}

p {
  font-size: clamp(18px, 3vw, 24px);
  max-width: 600px;
}

/* Botón */
button {
  margin-top: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 999px;
  font-size: 18px;
  cursor: pointer;
  background: linear-gradient(90deg, #ffcc00, #ff3d81, #00e5ff);
  color: #111;
  font-weight: bold;
  box-shadow: 0 0 25px rgba(0,229,255,.7);
}

/* Carta futurista */
#cardBox {
  display: none;
  margin-top: 20px;
}

#cardBox img {
  max-width: 85vw;
  max-height: 58vh;
  border-radius: 28px;
  border: 4px solid #00e5ff;
  box-shadow:
    0 0 20px #00e5ff,
    0 0 45px #8b5cf6,
    0 0 80px rgba(0,229,255,.7);
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="startScreen">
  <h1>NEON RUNNER</h1>
  <p>Esquiva obstáculos y recolecta monedas.</p>
  <p>Toca la pantalla o presiona ESPACIO</p>
  <button onclick="startGame()">Iniciar</button>
</div>

<div id="finalScreen">
  <h1>¡Excelente!</h1>
  <p>Acabas de desbloquear un próximo nivel.</p>
  <p>Abre la carta y mira las nuevas indicaciones.</p>

  <button id="openCardBtn">Abrir carta</button>

  <div id="cardBox">
    <img src="carta.jpg">
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let ground = H * 0.8;

let running = false;
let score = 0;
let coins = 0;
let speed = 7;

const player = {x:80,y:ground-50,w:40,h:50,vy:0,jump:false};
let obstacles = [];
let items = [];

function startGame(){
  document.getElementById("startScreen").style.display="none";
  running = true;
  loop();
}

function jump(){
  if(!player.jump){
    player.vy = -15;
    player.jump = true;
  }
}

window.addEventListener("pointerdown", jump);
window.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
});

function loop(){
  if(!running) return;

  ctx.clearRect(0,0,W,H);

  // gravedad
  player.vy += 0.8;
  player.y += player.vy;

  if(player.y >= ground-player.h){
    player.y = ground-player.h;
    player.vy = 0;
    player.jump = false;
  }

  // generar obstáculos
  if(Math.random()<0.02){
    obstacles.push({x:W,y:ground-40,w:30,h:40});
  }

  // generar monedas
  if(Math.random()<0.015){
    items.push({x:W,y:ground-100,r:10});
  }

  // dibujar suelo
  ctx.strokeStyle="#00e5ff";
  ctx.beginPath();
  ctx.moveTo(0,ground);
  ctx.lineTo(W,ground);
  ctx.stroke();

  // jugador
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // obstáculos
  obstacles.forEach(o=>{
    o.x -= speed;
    ctx.fillStyle="#ff3d81";
    ctx.fillRect(o.x,o.y,o.w,o.h);

    if(collide(player,o)){
      if(coins>0){
        coins--;
        obstacles=[];
      }else{
        running=false;
      }
    }
  });

  // monedas
  items.forEach(c=>{
    c.x -= speed;
    ctx.fillStyle="#ffcc00";
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fill();

    if(dist(player,c)<30){
      coins++;
      score++;
      c.x=-100;
    }
  });

  // HUD
  ctx.fillStyle="white";
  ctx.fillText("Puntos: "+score,20,30);
  ctx.fillText("Monedas: "+coins,20,60);

  // ganar
  if(score>=20){
    running=false;
    document.getElementById("finalScreen").style.display="flex";
  }

  requestAnimationFrame(loop);
}

function collide(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}

// botón carta
document.getElementById("openCardBtn").onclick = ()=>{
  document.getElementById("cardBox").style.display="block";
};
</script>

</body>
</html>
