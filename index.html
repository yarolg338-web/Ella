<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Run</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #eef3f8, #ffffff);
    font-family: monospace;
    color: #555;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .game-wrapper {
    width: 95%;
    max-width: 850px;
    background: #f7f7f7;
    border: 2px solid #ddd;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12);
    padding: 18px;
    position: relative;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
    background: #f7f7f7;
    touch-action: manipulation;
  }

  .screen {
    position: absolute;
    inset: 18px;
    background: rgba(247,247,247,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
  }

  .hidden {
    display: none;
  }

  .panel {
    border: 2px solid #555;
    border-radius: 14px;
    padding: 24px;
    max-width: 420px;
    background: #f7f7f7;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 28px;
  }

  p {
    font-size: 15px;
    line-height: 1.5;
  }

  button {
    margin-top: 12px;
    background: #555;
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 15px;
    cursor: pointer;
  }

  #finalScreen img {
    max-width: 90%;
    max-height: 70vh;
    border-radius: 12px;
    margin-top: 15px;
  }
</style>
</head>

<body>

<div class="game-wrapper">

  <canvas id="gameCanvas" width="800" height="300"></canvas>

  <div id="startScreen" class="screen">
    <div class="panel">
      <h1>DINO RUN</h1>
      <p>Salta los cactus y llega al final.</p>
      <p><b>Celular:</b> toca el juego para saltar.</p>
      <p><b>Computadora:</b> presiona ESPACIO.</p>
      <button onclick="startGame()">COMENZAR</button>
    </div>
  </div>

  <div id="gameOverScreen" class="screen hidden">
    <div class="panel">
      <h1>GAME OVER</h1>
      <p>Inténtalo otra vez.</p>
      <button onclick="restartGame()">REINTENTAR</button>
    </div>
  </div>

  <div id="finalScreen" class="screen hidden">
    <div class="panel">
      <h1>DESBLOQUEADO</h1>
      <p>Has llegado al final.</p>
      <img src="assets/carta.jpg" alt="Carta">
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const startScreen = document.getElementById("startScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const finalScreen = document.getElementById("finalScreen");

let dino;
let obstacles = [];
let clouds = [];
let score = 0;
let speed = 6;
let gravity = 1;
let groundX = 0;
let gameRunning = false;
let started = false;
let animationId = null;

let jumps = 0;
const maxJumps = 20;
let canJump = true;

function resetGame() {
  dino = {
    x: 65,
    y: 210,
    width: 44,
    height: 48,
    velocityY: 0,
    jumping: false
  };

  obstacles = [];
  clouds = [];
  score = 0;
  speed = 6;
  groundX = 0;
  jumps = 0;
  canJump = true;

  gameRunning = true;
  started = true;
}

function startGame() {
  resetGame();

  startScreen.classList.add("hidden");
  gameOverScreen.classList.add("hidden");
  finalScreen.classList.add("hidden");

  cancelAnimationFrame(animationId);
  loop();
}

function restartGame() {
  startGame();
}

function jump() {
  if (!gameRunning || !canJump || dino.jumping) return;

  dino.velocityY = -18;
  dino.jumping = true;
  canJump = false;

  jumps++;

  if (jumps >= maxJumps) {
    winGame();
  }
}

document.addEventListener("keydown", function(e) {
  if (e.code !== "Space") return;

  e.preventDefault();

  if (!started) {
    startGame();
  } else {
    jump();
  }
});

document.addEventListener("keyup", function(e) {
  if (e.code === "Space") canJump = true;
});

canvas.addEventListener("pointerdown", function(e) {
  e.preventDefault();

  if (!started) {
    startGame();
  } else {
    jump();
  }
});

canvas.addEventListener("pointerup", function() {
  canJump = true;
});

canvas.addEventListener("pointercancel", function() {
  canJump = true;
});

function createObstacle() {
  const type = Math.random();

  let width;
  let height;

  if (type < 0.45) {
    width = 18;
    height = 40;
  } else if (type < 0.8) {
    width = 28;
    height = 52;
  } else {
    width = 42;
    height = 45;
  }

  obstacles.push({
    x: canvas.width + 30,
    y: 258 - height,
    width,
    height
  });
}

function createCloud() {
  clouds.push({
    x: canvas.width + 30,
    y: 55 + Math.random() * 50
  });
}

function update() {
  score++;
  speed = 6 + score / 420;
  groundX -= speed;

  dino.y += dino.velocityY;
  dino.velocityY += gravity;

  if (dino.y >= 210) {
    dino.y = 210;
    dino.velocityY = 0;
    dino.jumping = false;
  }

  if (score % Math.max(50, Math.floor(105 - speed * 5)) === 0) {
    createObstacle();
  }

  if (score % 170 === 0) {
    createCloud();
  }

  obstacles.forEach(ob => ob.x -= speed);
  clouds.forEach(cloud => cloud.x -= speed * 0.3);

  obstacles = obstacles.filter(ob => ob.x + ob.width > 0);
  clouds = clouds.filter(cloud => cloud.x + 70 > 0);

  for (let ob of obstacles) {
    if (
      dino.x < ob.x + ob.width &&
      dino.x + dino.width > ob.x &&
      dino.y < ob.y + ob.height &&
      dino.y + dino.height > ob.y
    ) {
      loseGame();
    }
  }
}

function loseGame() {
  gameRunning = false;
  gameOverScreen.classList.remove("hidden");
  cancelAnimationFrame(animationId);
}

function winGame() {
  gameRunning = false;
  finalScreen.classList.remove("hidden");
  cancelAnimationFrame(animationId);
}

function drawDino() {
  ctx.fillStyle = "#555";

  ctx.fillRect(dino.x + 8, dino.y + 12, 26, 28);
  ctx.fillRect(dino.x + 26, dino.y, 18, 18);
  ctx.fillRect(dino.x + 36, dino.y + 12, 12, 6);
  ctx.fillRect(dino.x + 10, dino.y + 38, 8, 10);
  ctx.fillRect(dino.x + 26, dino.y + 38, 8, 10);
  ctx.fillRect(dino.x, dino.y + 24, 12, 8);

  ctx.fillStyle = "#f7f7f7";
  ctx.fillRect(dino.x + 36, dino.y + 5, 3, 3);
}

function drawCactus(ob) {
  ctx.fillStyle = "#555";

  ctx.fillRect(ob.x + ob.width / 2 - 4, ob.y, 8, ob.height);
  ctx.fillRect(ob.x, ob.y + 14, 8, 22);
  ctx.fillRect(ob.x + ob.width - 8, ob.y + 8, 8, 26);
  ctx.fillRect(ob.x + 4, ob.y + 14, 10, 6);
  ctx.fillRect(ob.x + ob.width - 14, ob.y + 8, 10, 6);
}

function drawGround() {
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(0, 258);
  ctx.lineTo(canvas.width, 258);
  ctx.stroke();

  ctx.fillStyle = "#555";

  for (let i = 0; i < canvas.width; i += 38) {
    let x = (i + groundX) % canvas.width;
    if (x < 0) x += canvas.width;

    ctx.fillRect(x, 268, 8, 2);
    ctx.fillRect(x + 18, 274, 4, 2);
  }
}

function drawClouds() {
  ctx.strokeStyle = "#bbb";
  ctx.lineWidth = 2;

  clouds.forEach(cloud => {
    ctx.beginPath();
    ctx.moveTo(cloud.x, cloud.y + 12);
    ctx.lineTo(cloud.x + 12, cloud.y + 12);
    ctx.quadraticCurveTo(cloud.x + 18, cloud.y, cloud.x + 30, cloud.y + 8);
    ctx.quadraticCurveTo(cloud.x + 42, cloud.y, cloud.x + 54, cloud.y + 12);
    ctx.lineTo(cloud.x + 66, cloud.y + 12);
    ctx.stroke();
  });
}

function drawScore() {
  ctx.fillStyle = "#555";
  ctx.font = "20px monospace";

  const hi = "HI 002005";
  const puntos = ("00000" + score).slice(-5);

  ctx.fillText("SALTOS " + jumps + "/20", 30, 35);
  ctx.fillText(hi + "  " + puntos, 555, 35);
}

function drawStartScene() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawClouds();
  drawGround();
  drawDino();
  drawScore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawClouds();
  drawGround();
  drawDino();
  obstacles.forEach(drawCactus);
  drawScore();
}

function loop() {
  if (!gameRunning) return;

  update();
  draw();

  animationId = requestAnimationFrame(loop);
}

dino = {
  x: 65,
  y: 210,
  width: 44,
  height: 48,
  velocityY: 0,
  jumping: false
};

drawStartScene();
</script>

</body>
</html>
